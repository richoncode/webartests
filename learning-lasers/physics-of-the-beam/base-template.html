<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}} — Learning Lasers</title>
    <style>
        /* VANTAGE-ALPHA Design Tokens */
        :root {
            --bg: #0d0d0d;
            --card: #1a1a1a;
            --border: 1px solid #2a2a2a;
            --radius: 16px;
            --font-main: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            --font-mono: 'SF Mono', 'Fira Code', monospace;
            
            --blue: #5b9bd5;
            --emerald: #10b981;
            --amber: #f59e0b;
            --red: #f87171;
            --gray: #555;
            --gray-hover: #aaa;
        }

        .version-badge {
            position: fixed;
            top: 20px;
            right: 24px;
            padding: 4px 12px;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            font-family: var(--font-mono);
            font-size: 10px;
            font-weight: 900;
            border-radius: 4px;
            z-index: 2000;
            letter-spacing: 1px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: var(--font-main); font-size: 15px; line-height: 1.7; min-height: 100vh; padding: 60px 24px 80px; }
        
        .page { max-width: 900px; margin: 0 auto; }
        
        /* Navigation */
        a.back { display: inline-block; margin-bottom: 40px; color: var(--gray); text-decoration: none; font-size: 14px; transition: color 0.2s; }
        a.back:hover { color: var(--gray-hover); }

        .seq-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; color: var(--blue); margin-bottom: 8px; }
        h1 { font-size: 32px; font-weight: 800; margin-bottom: 12px; letter-spacing: -0.5px; }
        .subtitle { color: #888; font-size: 16px; line-height: 1.6; max-width: 680px; margin-bottom: 56px; }

        /* Act Container */
        .module-container { display: flex; flex-direction: column; gap: 32px; }
        .act-card { background: var(--card); border: var(--border); border-radius: var(--radius); padding: 32px; }
        
        /* Viz Layout */
        .viz-layout { display: grid; grid-template-columns: 1fr 320px; gap: 40px; align-items: start; }
        @media (max-width: 768px) { .viz-layout { grid-template-columns: 1fr; } }
        
        .canvas-container { background: var(--blue); border-radius: 8px; aspect-ratio: 1; position: relative; overflow: hidden; }
        canvas { display: block; width: 100%; height: 100%; image-rendering: pixelated; }

        /* Controls */
        .controls { display: flex; flex-direction: column; gap: 24px; }
        .control-group { display: flex; flex-direction: column; gap: 10px; }
        .label-row { display: flex; justify-content: space-between; align-items: center; }
        .label-text { font-size: 12px; font-weight: 700; text-transform: uppercase; color: #aaa; letter-spacing: 0.5px; }
        .label-val { font-family: var(--font-mono); font-size: 13px; color: var(--blue); }
        
        input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: #333; border-radius: 2px; outline: none; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; background: var(--blue); border-radius: 50%; cursor: pointer; border: 3px solid var(--card); }

        /* Metrics */
        .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 16px; }
        .metric-card { background: #0d0d0d; border: 1px solid #222; border-radius: 8px; padding: 16px; }
        .metric-label { font-size: 10px; font-weight: 800; text-transform: uppercase; color: #666; margin-bottom: 4px; display: block; }
        .metric-value { font-family: var(--font-mono); font-size: 14px; color: #fff; }

        /* Thermal Gauge */
        .gauge-container { margin-top: 24px; }
        .gauge-bar { width: 100%; height: 8px; background: #222; border-radius: 4px; border: 1px solid #333; overflow: hidden; position: relative; }
        .gauge-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--emerald), var(--amber), var(--red)); transition: width 0.3s ease; }

        /* Callouts */
        .callout { border-left: 3px solid var(--blue); background: #0d1620; padding: 20px; border-radius: 0 8px 8px 0; font-size: 14px; color: #aaa; margin: 32px 0; }
        .callout.success { border-color: var(--emerald); background: #0d2016; }
        .callout.failure { border-color: var(--red); background: #200d0d; }
        .callout strong { color: #fff; }

        /* Tooltips */
        [data-tooltip] { position: relative; cursor: help; border-bottom: 1px dashed #444; }
        [data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 140%; left: 50%; transform: translateX(-50%);
            background: #111; border: 1px solid #333; color: #bbb;
            padding: 12px; border-radius: 8px; font-size: 12px; line-height: 1.4;
            width: 240px; z-index: 1000; opacity: 0; visibility: hidden;
            transition: all 0.2s; box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            pointer-events: none; text-transform: none; font-weight: 400; text-align: left;
        }
        [data-tooltip]:hover::after { opacity: 1; visibility: visible; bottom: 150%; }

        /* Act Locking */
        .locked { opacity: 0.4; pointer-events: none; filter: grayscale(1); }
        .btn-next { display: inline-block; margin-top: 24px; padding: 12px 24px; background: var(--blue); color: #fff; border-radius: 8px; text-decoration: none; font-weight: 700; font-size: 14px; border: none; cursor: pointer; }
        .btn-next:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* Chapter Nav */
        .chapter-nav { display: flex; justify-content: space-between; margin-top: 80px; padding-top: 40px; border-top: 1px solid #1e1e1e; }
        .chapter-nav a { text-decoration: none; color: var(--gray); font-size: 14px; transition: color 0.1s; }
        .chapter-nav a:hover { color: var(--gray-hover); }
        .chapter-nav .label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #333; margin-bottom: 4px; }
    </style>
</head>
<body>
    <div class="version-badge">V-ALPHA-050</div>
    <div class="page">
        <a class="back" href="../">← Physics of the Beam</a>
        
        <div class="seq-label">Sequence {{SEQ}}</div>
        <h1>{{TITLE}}</h1>
        <p class="subtitle">{{SUBTITLE}}</p>

        <div class="module-container">
            <!-- Act I: The Failure -->
            <div id="act-failure" class="act-card">
                <div class="seq-label" style="color: var(--red);">Act I: The Failure</div>
                <h2 style="margin-bottom: 16px;">{{FAILURE_TITLE}}</h2>
                <div class="viz-layout">
                    <div class="canvas-container">
                        <canvas id="failCanvas"></canvas>
                    </div>
                    <div class="controls">
                        {{FAILURE_CONTROLS}}
                        <div class="metric-grid">
                            {{FAILURE_METRICS}}
                        </div>
                        <button id="btn-fix" class="btn-next" onclick="unlockSuccess()">I see the problem</button>
                    </div>
                </div>
            </div>

            <!-- Act II: The Success -->
            <div id="act-success" class="act-card locked">
                <div class="seq-label" style="color: var(--emerald);">Act II: The Fix</div>
                <h2 style="margin-bottom: 16px;">{{SUCCESS_TITLE}}</h2>
                <div class="viz-layout">
                    <div class="canvas-container">
                        <canvas id="successCanvas"></canvas>
                    </div>
                    <div class="controls">
                        {{SUCCESS_CONTROLS}}
                        <div class="metric-grid">
                            {{SUCCESS_METRICS}}
                        </div>
                        <div class="gauge-container">
                            <span class="label-text">Peak Heat Stress</span>
                            <div class="gauge-bar"><div id="heatGauge" class="gauge-fill"></div></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="chapter-nav">
            <div id="nav-prev"></div>
            <div id="nav-next"></div>
        </div>
    </div>

    <script>
        // Shared Utilities
        const SimUtils = {
            // Physics Constants
            IR_SPOT: 0.03, // mm
            BLUE_SPOT: 0.08, // mm
            
            // Formatters
            formatMM: (val) => val.toFixed(3) + ' mm',
            formatFluence: (val) => val.toFixed(4) + ' J/mm²',
            
            // Canvas Helper
            setupCanvas: (canvasId, drawFn) => {
                const canvas = document.getElementById(canvasId);
                const ctx = canvas.getContext('2d');
                const dpr = window.devicePixelRatio || 1;
                const resize = () => {
                    const rect = canvas.getBoundingClientRect();
                    canvas.width = rect.width * dpr;
                    canvas.height = rect.height * dpr;
                    ctx.scale(dpr, dpr);
                    drawFn(ctx, rect.width, rect.height);
                };
                window.addEventListener('resize', resize);
                resize();
                return resize;
            }
        };

        function unlockSuccess() {
            document.getElementById('act-success').classList.remove('locked');
            document.getElementById('btn-fix').disabled = true;
            document.getElementById('btn-fix').textContent = 'Problem Identified';
            // Scroll to success
            document.getElementById('act-success').scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
