<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Tool</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0d0d;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ── App header ── */
.app-header{display:flex;align-items:center;gap:0;height:38px;border-bottom:1px solid #1e1e1e;flex-shrink:0;overflow:hidden}
a.back{color:#666;text-decoration:none;font-size:13px;padding:0 12px;white-space:nowrap;flex-shrink:0}
a.back:hover{color:#bbb}
.header-btns{display:flex;gap:1px;padding:0 6px;flex-shrink:0;border-right:1px solid #1e1e1e}

/* ── Tab bar ── */
.tab-bar{flex:1;display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none;min-width:0}
.tab-bar::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:6px;padding:0 12px;height:38px;flex-shrink:0;font-size:12px;color:#666;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none;border-left:1px solid transparent;transition:color .1s}
.tab:hover{color:#bbb;background:#111}
.tab.active{color:#ddd;border-bottom-color:#5b9bd5;background:#111}
.tab-icon{font-size:11px;opacity:.7}
.tab-label{max-width:130px;overflow:hidden;text-overflow:ellipsis}
.tab-close{font-size:14px;color:#333;line-height:1;padding:1px 3px;border-radius:3px;margin-left:2px;flex-shrink:0}
.tab:hover .tab-close,.tab.active .tab-close{color:#777}
.tab-close:hover{color:#ccc!important;background:#2a2a2a}

/* ── Shared buttons ── */
.hbtn{background:#1a1a1a;border:1px solid #2e2e2e;color:#bbb;padding:4px 11px;border-radius:6px;font-size:12px;cursor:pointer;transition:background .1s,border-color .1s,color .1s;font-family:inherit;white-space:nowrap}
.hbtn:hover:not(:disabled){background:#222;border-color:#555;color:#fff}
.hbtn:disabled{opacity:.28;cursor:default}
.hbtn.primary{background:#1a2a3a;border-color:#5b9bd5;color:#7ab3e0}
.hbtn.primary:hover:not(:disabled){background:#1e3248}
.btn-group{display:flex;gap:5px}

/* ── Tab pane layout ── */
.tab-content{flex:1;min-height:0;position:relative}
.tab-pane{position:absolute;inset:0;display:none;flex-direction:row}
.tab-pane.active{display:flex}

.welcome{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:10}
.welcome-title{font-size:20px;font-weight:700;color:#888}
.welcome-sub{font-size:13px;color:#444}
.welcome-btns{display:flex;gap:10px}

/* ── Left Tool Panel ── */
.left-tool-panel{width:300px;flex-shrink:0;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;background:#0d0d0d}
.tool-header{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.tool-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#555}
.tool-scroll{flex:1;overflow-y:auto;padding:10px 12px 20px}
.tool-scroll::-webkit-scrollbar{width:3px}
.tool-scroll::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}

/* ── XCS Viewer Component ── */
.xcs-viewer{flex:1;display:flex;flex-direction:column;min-width:0;background:#0f0f0f}
.viewer-top{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.viewer-fname{font-size:12px;color:#666;font-family:'SF Mono','Fira Code',monospace;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.viewer-main{flex:1;display:flex;min-height:0;position:relative}

.canvas-panel{flex:1;background:#0f0f0f;position:relative;min-width:0;border-right:1px solid #1a1a1a}
.canvas-panel svg{width:100%;height:100%;display:block}
.canvas-label{position:absolute;bottom:8px;left:10px;font-size:10px;color:#3a3a3a;font-family:'SF Mono','Fira Code',monospace;pointer-events:none}

.right-info-panel{width:280px;flex-shrink:0;display:flex;flex-direction:column;background:#0d0d0d}
.right-tabs{display:flex;padding:6px 8px 0;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.rtab{padding:4px 12px;font-size:12px;font-weight:600;cursor:pointer;border-radius:6px 6px 0 0;color:#555;background:none;border:none;font-family:inherit;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .1s}
.rtab:hover{color:#aaa}
.rtab.active{color:#7ab3e0;border-bottom-color:#5b9bd5}

.panel-body{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden}
.list-header{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:#555;padding:8px 12px 4px}

.shape-list, .pal-list{flex:1;overflow-y:auto;padding:2px 8px 8px}
.shape-list::-webkit-scrollbar, .pal-list::-webkit-scrollbar, .json-scroll::-webkit-scrollbar{width:3px}
.shape-list::-webkit-scrollbar-thumb, .pal-list::-webkit-scrollbar-thumb, .json-scroll::-webkit-scrollbar-thumb{background:#252525;border-radius:2px}

.shape-row{padding:5px 7px;border-radius:5px;cursor:pointer;border:1px solid transparent;transition:background .1s;display:flex;align-items:center;gap:6px;margin-bottom:2px}
.shape-row:hover,.shape-row.hl{background:#181818;border-color:#262626}
.shape-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.shape-row-title{font-size:12px;font-weight:600;color:#ccc}
.shape-row.hl .shape-row-title{color:#fff}
.shape-row-sub{font-size:10px;color:#666;font-family:'SF Mono','Fira Code',monospace;margin-top:1px}

.pal-row{padding:8px 10px;border-radius:6px;border:1px solid #1a1a1a;background:#111;margin-bottom:6px;display:flex;flex-direction:column;gap:4px}
.pal-row-top{display:flex;justify-content:space-between;align-items:center}
.pal-id{font-size:10px;font-weight:800;color:#444;text-transform:uppercase}
.pal-count{font-size:10px;color:#5b9bd5;background:rgba(91,155,213,.1);padding:1px 5px;border-radius:10px}
.pal-params{display:flex;gap:12px;font-family:'SF Mono','Fira Code',monospace;font-size:11px;color:#ccc}
.pal-v{color:#f0a040;font-weight:600}
.pal-u{color:#555;font-size:9px;margin-left:1px}
.pal-types{font-size:10px;color:#555;font-style:italic}

.json-scroll{flex:1;min-height:0;overflow-y:auto;padding:10px 12px}
pre.json-code{font-family:'SF Mono','Fira Code',monospace;font-size:10.5px;line-height:1.55;white-space:pre;color:#666;margin:0}
.j-key{color:#7ab3e0}.j-str{color:#88c87a}.j-num{color:#f0a040}.j-bool{color:#e07070}.j-null{color:#666}
.json-display-block{display:block;border-left:2px solid transparent;padding-left:4px;margin-left:-6px;border-radius:0 3px 3px 0;transition:border-color .12s,background .12s;cursor:pointer}
.json-display-block:hover,.json-display-block.json-hl{background:rgba(91,155,213,.08);border-left-color:rgba(91,155,213,.5)}

.stats-bar{padding:5px 16px;border-top:1px solid #161616;flex-shrink:0;display:flex;gap:18px;flex-wrap:wrap;background:#0d0d0d}
.stat{font-size:11px;color:#555}.stat strong{color:#999;font-weight:600}

/* ── Popup ── */
.popup{position:fixed;z-index:200;pointer-events:none;background:#1c1c1c;border:1px solid #2e2e2e;border-radius:10px;padding:10px 14px;min-width:160px;box-shadow:0 8px 28px rgba(0,0,0,.6);opacity:0;transition:opacity .1s}
.popup.show{opacity:1}
.popup-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#7ab3e0;margin-bottom:7px}
.popup-row{display:flex;justify-content:space-between;gap:14px;font-size:12px;margin-bottom:3px}
.popup-row:last-child{margin-bottom:0}
.popup-key{color:#666}.popup-val{color:#ddd;font-family:'SF Mono','Fira Code',monospace;font-weight:600}
.popup-val.hi{color:#f0a040}

/* ── Drop Zone ── */
.drop-zone{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;margin:16px;border:2px dashed #222;border-radius:14px;padding:60px;cursor:pointer;transition:border-color .15s,background .15s;background:#0d0d0d;z-index:20}
.drop-zone.over{border-color:#5b9bd5;background:#0a1520}
.drop-zone-icon{font-size:36px}
.drop-zone-title{font-size:16px;font-weight:600;color:#888}
.drop-zone-sub{font-size:12px;color:#444}

/* ── Mandala Tool Styles ── */
.ctrl-section{margin-bottom:16px}
.ctrl-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:#4a4a4a;margin-bottom:8px;padding-bottom:5px;border-bottom:1px solid #181818;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ctrl-section-title:hover{color:#777}
.ctrl-section-body{display:flex;flex-direction:column;gap:6px}
.ctrl-section-body.collapsed{display:none}
.ctrl-row{display:flex;align-items:center;gap:8px;min-height:24px}
.ctrl-label{font-size:11px;color:#888;width:90px;flex-shrink:0}
.ctrl-val-wrap{flex:1;display:flex;align-items:center;gap:6px}
input[type=range]{flex:1;accent-color:#5b9bd5;height:4px}
.range-val{font-size:11px;color:#aaa;font-family:'SF Mono','Fira Code',monospace;min-width:36px;text-align:right}
.ctrl-select,.ctrl-number{background:#161616;border:1px solid #2a2a2a;color:#ccc;padding:3px 7px;border-radius:5px;font-size:12px;font-family:inherit;cursor:pointer}
.ctrl-select{flex:1}
.ctrl-number{width:62px;text-align:center}
.ctrl-number::-webkit-inner-spin-button{opacity:1}
.ctrl-toggle{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:12px;color:#888}
.ctrl-toggle input[type=checkbox]{accent-color:#5b9bd5;width:14px;height:14px;cursor:pointer}
.ctrl-toggle:hover{color:#ccc}
.ring-counter{display:flex;align-items:center;gap:6px}
.ring-counter-val{font-size:13px;font-weight:600;color:#ccc;min-width:20px;text-align:center}
.hbtn.sm{padding:2px 8px;font-size:11px}
.entry-picker{display:flex;align-items:center;gap:5px;flex:1}
.entry-swatch{width:14px;height:14px;border-radius:3px;flex-shrink:0;border:1px solid rgba(255,255,255,.1)}
.entry-select{flex:1;background:#161616;border:1px solid #2a2a2a;color:#ccc;padding:3px 7px;border-radius:5px;font-size:12px;font-family:inherit;cursor:pointer}
</style>
</head>
<body>

<div class="app-header">
  <a class="back" href="../">← Back</a>
  <div class="header-btns">
    <button class="hbtn" id="openXcsBtn">Open XCS</button>
    <button class="hbtn primary" id="newMandalaBtn">+ Mandala</button>
    <button class="hbtn primary" id="newGradientBtn">+ Gradient</button>
  </div>
  <div class="tab-bar" id="tabBar"></div>
</div>

<div class="tab-content" id="tabContent">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-title">Pattern Tool</div>
    <div class="welcome-sub">Open an XCS file or create a new mandala design</div>
    <div class="welcome-btns">
      <button class="hbtn" onclick="document.getElementById('openXcsBtn').click()">Open XCS file</button>
      <button class="hbtn primary" onclick="TabMgr.newMandala()">New Mandala</button>
      <button class="hbtn primary" onclick="TabMgr.newGradient()">New Gradient</button>
    </div>
  </div>
</div>

<div class="popup" id="globalPopup">
  <div class="popup-title" id="gpTitle"></div>
  <div class="popup-row"><span class="popup-key">Power</span><span class="popup-val hi" id="gpPower"></span></div>
  <div class="popup-row"><span class="popup-key">Speed</span><span class="popup-val" id="gpSpeed"></span></div>
  <div class="popup-row"><span class="popup-key">Density</span><span class="popup-val" id="gpDensity"></span></div>
  <div class="popup-row" id="gpRepeatRow"><span class="popup-key">Repeat</span><span class="popup-val" id="gpRepeat"></span></div>
  <div class="popup-row"><span class="popup-key">Size</span><span class="popup-val" id="gpSize"></span></div>
  <div class="popup-row"><span class="popup-key">Position</span><span class="popup-val" id="gpPos"></span></div>
</div>

<script>
'use strict';

// ═══════════════════════════════════════════════════════════════════
// CONSTANTS & FALLBACK PALETTE DATA
// ═══════════════════════════════════════════════════════════════════
const PALETTE_FILES = ['laFont-1000lpcm'];
const FALLBACK_PALETTES = {
  'laFont-1000lpcm': {
    id:'laFont-1000lpcm', name:'LaFont SS304 IR',
    description:'Brushed SS304, 1000 LPCM, 200 mm/s',
    speed:200, lpcm:1000, laser:'ir',
    entries:[
      {label:'Pale Straw',    power:16, rgb:'#d4bc4a'},
      {label:'Straw Gold',    power:18, rgb:'#d4a018'},
      {label:'Gold',          power:20, rgb:'#c88010'},
      {label:'Deep Gold',     power:22, rgb:'#c07010'},
      {label:'Amber',         power:24, rgb:'#b06030'},
      {label:'Copper Rose',   power:26, rgb:'#984050'},
      {label:'Magenta',       power:28, rgb:'#881870'},
      {label:'Violet',        power:30, rgb:'#601098'},
      {label:'Blue-Violet',   power:32, rgb:'#4010b8'},
      {label:'Indigo',        power:34, rgb:'#2018c8'},
      {label:'Royal Blue',    power:36, rgb:'#1038c0'},
      {label:'Blue',          power:38, rgb:'#0858b8'},
      {label:'Sky Blue',      power:40, rgb:'#0878b0'},
      {label:'Azure',         power:42, rgb:'#0898a8'},
      {label:'Teal Blue',     power:44, rgb:'#10a898'},
      {label:'Teal',          power:46, rgb:'#18a090'},
      {label:'Muted Teal',    power:48, rgb:'#209888'},
      {label:'Steel Teal',    power:50, rgb:'#288080'},
      {label:'Blue-Grey',     power:52, rgb:'#306068'},
      {label:'Dark Grey-Blue',power:54, rgb:'#384858'},
      {label:'Near Grey',     power:56, rgb:'#3a3c48'},
    ]
  }
};
const PAD = 20;

// ═══════════════════════════════════════════════════════════════════
// APP STATE
// ═══════════════════════════════════════════════════════════════════
const App = {
  palettes: {},
  tabs: [],
  activeTabId: null,
  instances: {},
  tabCounter: 0,
};

// ═══════════════════════════════════════════════════════════════════
// XCS VIEWER COMPONENT
// ═══════════════════════════════════════════════════════════════════
const XCSViewer = {
  create(tabId) {
    const viewer = document.createElement('div');
    viewer.className = 'xcs-viewer';
    viewer.innerHTML = `
      <div class="viewer-top">
        <span class="viewer-fname"></span>
        <div class="btn-group">
          <button class="hbtn export-xcs-btn" disabled>Export XCS</button>
          <button class="hbtn primary export-pal-btn" disabled>Export Palette</button>
        </div>
      </div>
      <div class="viewer-main">
        <div class="canvas-panel">
          <svg class="svg-canvas" xmlns="http://www.w3.org/2000/svg"></svg>
          <div class="canvas-label"></div>
        </div>
        <div class="right-info-panel">
          <div class="right-tabs">
            <button class="rtab active" data-tab="shapes">Shapes</button>
            <button class="rtab" data-tab="palette">Palette</button>
            <button class="rtab" data-tab="process">Process</button>
            <button class="rtab" data-tab="json">JSON</button>
          </div>
          <div class="panel-body shapes-body">
            <div class="list-header shapes-hdr">Shapes</div>
            <div class="shape-list"></div>
          </div>
          <div class="panel-body palette-body" style="display:none">
            <div class="list-header pal-hdr">Unique Settings</div>
            <div class="pal-list"></div>
          </div>
          <div class="panel-body process-body" style="display:none">
            <div class="list-header proc-hdr">Processing Tree</div>
            <div class="process-tree"></div>
          </div>
          <div class="panel-body json-body" style="display:none">
            <div class="json-scroll"><pre class="json-code"></pre></div>
          </div>
        </div>
      </div>
      <div class="stats-bar">
        <div class="stat s-shapes"></div><div class="stat s-type"></div>
        <div class="stat s-power"></div><div class="stat s-speed"></div><div class="stat s-density"></div>
      </div>`;

    const q = s => viewer.querySelector(s);
    
    // Sub-tabs logic
    q('.right-tabs').addEventListener('click', e => {
      const tab = e.target.closest('.rtab');
      if (!tab) return;
      viewer.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const target = tab.dataset.tab;
      q('.shapes-body').style.display  = target === 'shapes'  ? 'flex' : 'none';
      q('.palette-body').style.display = target === 'palette' ? 'flex' : 'none';
      q('.process-body').style.display = target === 'process' ? 'flex' : 'none';
      q('.json-body').style.display    = target === 'json'    ? 'flex' : 'none';
    });

    // Process tree click -> Scroll JSON
    q('.process-tree').addEventListener('click', e => {
      const item = e.target.closest('.tree-item');
      if (item && item.dataset.id) {
        q('.rtab[data-tab="json"]').click();
        const block = q(`.json-display-block[data-node-id="${item.dataset.id}"]`);
        if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });

    // Shape list click -> Switch to JSON and scroll to TOP
    q('.shapes-body').addEventListener('click', e => {
      const row = e.target.closest('.shape-row');
      if (row) {
        const idx = +row.dataset.idx;
        q('.rtab[data-tab="json"]').click();
        const block = q(`.json-display-block[data-idx="${idx}"]`);
        if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
        this.onHover(viewer, App.instances[tabId].state, idx);
      }
    });

    // SVG click -> Switch to JSON and scroll to TOP
    q('.svg-canvas').addEventListener('click', e => {
      const el = e.target.closest('[data-svg-idx]');
      if (el) {
        const idx = +el.getAttribute('data-svg-idx');
        q('.rtab[data-tab="json"]').click();
        const block = q(`.json-display-block[data-idx="${idx}"]`);
        if (block) block.scrollIntoView({ behavior: 'smooth', block: 'start' });
        this.onHover(viewer, App.instances[tabId].state, idx);
      }
    });

    // JSON block click -> Switch to Shapes and scroll
    q('.json-code').addEventListener('click', e => {
      const b = e.target.closest('.json-display-block');
      if (b) {
        const idx = +b.dataset.idx;
        q('.rtab[data-tab="shapes"]').click();
        const row = q(`.shape-row[data-idx="${idx}"]`);
        if (row) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        this.onHover(viewer, App.instances[tabId].state, idx);
      }
    });

    // Export buttons
    q('.export-xcs-btn').addEventListener('click', () => {
      const inst = App.instances[tabId];
      if (inst && inst.state.rawData) {
        const now = new Date();
        const ts = now.toISOString().replace(/[:T]/g, '-').split('.')[0];
        const def = (q('.viewer-fname').textContent || `mandala-${ts}`).replace(/\.xcs$/i, '') + '.xcs';
        let name = prompt("Export XCS as:", def);
        if (!name) return;
        if (!name.toLowerCase().endsWith('.xcs')) name += '.xcs';
        dl(name, JSON.stringify(inst.state.rawData, null, 2), 'application/json');
      }
    });
    q('.export-pal-btn').addEventListener('click', () => {
      const inst = App.instances[tabId];
      if (inst) this.exportPalette(q, inst.state);
    });

    // Hover delegation
    const jc = q('.json-code');
    jc.addEventListener('mouseover', e => {
      const b = e.target.closest('.json-display-block');
      if (b) this.onHover(viewer, App.instances[tabId].state, +b.dataset.idx, e);
      else this.onLeave(viewer);
    });
    jc.addEventListener('mousemove', e => { if (e.target.closest('.json-display-block')) Popup.move(e); });
    jc.addEventListener('mouseleave', () => this.onLeave(viewer));

    return viewer;
  },

  update(pane, state, lazy = false) {
    const v = pane.querySelector('.xcs-viewer');
    const q = s => v.querySelector(s);
    
    if (!state.shapes || !state.shapes.length) {
      v.style.display = 'none';
      return;
    }
    v.style.display = 'flex';
    q('.export-xcs-btn').disabled = false;
    q('.export-pal-btn').disabled = false;

    this.renderSVG(v, state);
    this.renderStats(v, state);

    if (lazy) {
      if (this._lazyTimer) clearTimeout(this._lazyTimer);
      this._lazyTimer = setTimeout(() => {
        this.renderList(v, state);
        this.renderPaletteList(v, state);
        this.renderProcessTree(v, state);
        this.renderJSON(v, state);
        this._lazyTimer = null;
      }, 250);
    } else {
      if (this._lazyTimer) { clearTimeout(this._lazyTimer); this._lazyTimer = null; }
      this.renderList(v, state);
      this.renderPaletteList(v, state);
      this.renderProcessTree(v, state);
      this.renderJSON(v, state);
    }
  },

  renderSVG(v, state) {
    const panel = v.querySelector('.canvas-panel');
    const W = panel.clientWidth||500, H = panel.clientHeight||500;
    const { shapes } = state;
    
    // Fixed Laser Area: 100x100mm
    const AREA = 100;
    const sc = Math.min((W-PAD*2)/AREA, (H-PAD*2)/AREA);
    const ox = PAD + ((W-PAD*2) - AREA*sc)/2;
    const oy = PAD + ((H-PAD*2) - AREA*sc)/2;
    const mm2 = (x,y) => [x*sc+ox, y*sc+oy];
    
    const svg = v.querySelector('.svg-canvas');
    svg.setAttribute('viewBox', `0 0 ${W} ${H}`);
    svg.innerHTML = '';
    
    // Laser Area Boundary
    const [ax, ay] = mm2(0, 0);
    const aw = AREA * sc;
    svg.appendChild(svgEl('rect', { x:ax, y:ay, width:aw, height:aw, fill:'#111', stroke:'#333', 'stroke-width':'1' }));

    // Grid (10mm steps)
    const gg = svgEl('g', {opacity:'0.15'});
    for (let g = 0; g <= AREA; g += 10) {
      const [p1] = mm2(g, 0);
      const [,p2] = mm2(0, g);
      gg.appendChild(svgEl('line',{x1:p1, y1:ay, x2:p1, y2:ay+aw, stroke:'#5b9bd5','stroke-width':'0.5'}));
      gg.appendChild(svgEl('line',{x1:ax, y1:p2, x2:ax+aw, y2:p2, stroke:'#5b9bd5','stroke-width':'0.5'}));
    }
    svg.appendChild(gg);

    const labels = [];
    for (const s of [...shapes].sort((a,b) => a.zOrder-b.zOrder)) {
      const [cx,cy] = mm2(s.x, s.y);
      const rx = s.w/2*sc, ry = s.h/2*sc;
      let el;
      
      const isFill = s.processingType === 'fill' || s.processingType === 'COLOR_FILL_ENGRAVE' || s.processingType === 'FILL_VECTOR_ENGRAVING';
      const fillOp = isFill ? '0.6' : '0.22';
      const strW = isFill ? '0' : '1.5';
      const strC = isFill ? 'none' : s.layerColor;

      if (s.type==='CIRCLE') el = svgEl('ellipse',{cx,cy,rx,ry,fill:s.layerColor,'fill-opacity':fillOp,stroke:strC,'stroke-width':strW});
      else if (s.type==='RECT') el = svgEl('rect',{x:cx-rx,y:cy-ry,width:rx*2,height:ry*2,fill:s.layerColor,'fill-opacity':fillOp,stroke:strC,'stroke-width':strW});
      else el = svgEl('rect',{x:cx-rx,y:cy-ry,width:rx*2,height:ry*2,fill:'none',stroke:'#555','stroke-width':'1','stroke-dasharray':'3 3'});
      
      el.setAttribute('data-svg-idx', s.idx);
      el.setAttribute('data-is-fill', isFill ? 'true' : 'false');
      el.style.cursor = 'pointer';
      el.addEventListener('mouseenter', ev => this.onHover(v, state, s.idx, ev));
      el.addEventListener('mousemove',  ev => Popup.move(ev));
      el.addEventListener('mouseleave', () => this.onLeave(v));
      svg.appendChild(el);
      
      if (s.power != null && rx > 9 && !s.hideLabels) {
        const t = svgEl('text',{x:cx,y:cy+4,'text-anchor':'middle','font-size':Math.min(rx*.55,12),'font-family':'SF Mono,Fira Code,monospace',fill:isFill?'#000':'#fff','fill-opacity':isFill?'0.8':'0.7','font-weight':isFill?'800':'400','pointer-events':'none'});
        t.textContent = s.power+'%'; labels.push(t);
      }
    }
    labels.forEach(t => svg.appendChild(t));
    v.querySelector('.canvas-label').textContent = `Laser Area: 100 × 100 mm`;
  },

  renderList(v, state) {
    v.querySelector('.shapes-hdr').textContent = `Shapes (${state.shapes.length})`;
    const list = v.querySelector('.shape-list');
    list.innerHTML = '';
    state.shapes.forEach(s => {
      const row = document.createElement('div');
      row.className = 'shape-row'; row.dataset.idx = s.idx;
      const typeLabel = s.processingType ? s.processingType.toUpperCase() : '—';
      const laserLabel = s.laser ? `<span style="color:#5b9bd5;font-weight:800;margin-left:4px">${s.laser.toUpperCase()}</span>` : '';
      const deLabel = s.density != null ? `${s.density} lpcm` : '—';
      row.innerHTML = `
        <div class="shape-dot" style="background:${s.layerColor}"></div>
        <div style="flex:1">
          <div class="shape-row-title">${s.type} #${s.idx+1} ${laserLabel} <span style="color:#444;font-size:9px;margin-left:4px">${typeLabel}</span></div>
          <div class="shape-row-sub">${s.power!=null?s.power+' pwr%':'—'} · ${s.speed!=null?s.speed+' mm/s':'—'} · ${deLabel}</div>
          <div style="font-size:8px;color:#444;font-family:monospace;margin-top:2px">ID: ${s.id}</div>
        </div>`;
      row.addEventListener('mouseenter', ev => this.onHover(v, state, s.idx, ev));
      row.addEventListener('mousemove',  ev => Popup.move(ev));
      row.addEventListener('mouseleave', () => this.onLeave(v));
      list.appendChild(row);
    });
  },

  renderPaletteList(v, state) {
    const combos = this.getUniqueCombos(state);
    const list = v.querySelector('.pal-list');
    list.innerHTML = '';
    combos.forEach((c, i) => {
      const row = document.createElement('div');
      row.className = 'pal-row';
      const pw = c.power != null ? `${c.power}<span class="pal-u"> pwr%</span>` : '—';
      const sp = c.speed != null ? `${c.speed}<span class="pal-u"> mm/s</span>` : '—';
      const de = c.density != null ? `${c.density}<span class="pal-u"> lpcm</span>` : '—';
      const laserLabel = c.laser ? `<span style="color:#5b9bd5;font-weight:800;font-size:9px;margin-left:4px">${c.laser.toUpperCase()}</span>` : '';
      row.innerHTML = `
        <div class="pal-row-top">
          <span class="pal-id">#${i+1} ${laserLabel}</span>
          <span class="pal-count">${c.count} shapes</span>
        </div>
        <div class="pal-params">
          <span>P: <span class="pal-v">${pw}</span></span>
          <span>S: <span class="pal-v">${sp}</span></span>
          <span>D: <span class="pal-v">${de}</span></span>
        </div>
        <div class="pal-types">${[...c.types].join(', ')}</div>`;
      list.appendChild(row);
    });
    v.querySelector('.pal-hdr').textContent = `Unique Settings (${combos.length})`;
  },

  getUniqueCombos(state) {
    const combos = new Map();
    state.shapes.forEach(s => {
      const key = `${s.power}|${s.speed}|${s.density}|${s.repeat}|${s.laser}`;
      if (!combos.has(key)) combos.set(key, {power:s.power, speed:s.speed, density:s.density, repeat:s.repeat, laser:s.laser, count:0, types:new Set()});
      const c = combos.get(key); c.count++; c.types.add(s.type);
    });
    const params = ['power','speed','density'];
    const un = p => new Set(state.shapes.map(s=>s[p]).filter(v=>v!=null)).size;
    const sp = params.reduce((b,p) => un(p)>un(b)?p:b, params[0]);
    return [...combos.values()].sort((a,b) => (a[sp]??-Infinity)-(b[sp]??-Infinity));
  },

  renderJSON(v, state) {
    const raw = JSON.stringify(state.rawData, null, 2);
    const positions = [];
    
    // Geometry blocks
    state.shapes.forEach(s => {
      const needle = `"id": "${s.id}"`;
      const pos = raw.indexOf(needle);
      if (pos === -1) return;
      let start = raw.lastIndexOf('{', pos), depth = 1, i = start+1;
      while (i < raw.length && depth > 0) { if (raw[i]==='{') depth++; else if (raw[i]==='}') depth--; i++; }
      positions.push({id:s.id, start, end:i, type:'geo', idx:s.idx});
    });

    // Processing blocks
    const findNodes = (obj, path='') => {
      if (obj && typeof obj === 'object') {
        if (obj.id || obj.processingType) {
          const needle = obj.id ? `"id": "${obj.id}"` : `"processingType": "${obj.processingType}"`;
          const pos = raw.indexOf(needle);
          if (pos !== -1) {
            let start = raw.lastIndexOf('{', pos), depth = 1, i = start+1;
            while (i < raw.length && depth > 0) { if (raw[i]==='{') depth++; else if (raw[i]==='}') depth--; i++; }
            positions.push({id:obj.id||obj.processingType, start, end:i, type:'proc'});
          }
        }
        Object.keys(obj).forEach(k => findNodes(obj[k], path ? `${path}.${k}` : k));
      }
    };
    findNodes(state.rawData.device);

    positions.sort((a,b) => a.start-b.start);
    let html = '', cursor = 0;
    for (const p of positions) {
      if (p.start < cursor) continue; // Skip nested for now to keep simple
      html += syntaxHL(raw.slice(cursor, p.start));
      const attr = p.type==='geo' ? `data-idx="${p.idx}"` : `data-node-id="${p.id}"`;
      html += `<span class="json-display-block" ${attr}>${syntaxHL(raw.slice(p.start, p.end))}</span>`;
      cursor = p.end;
    }
    html += syntaxHL(raw.slice(cursor));
    v.querySelector('.json-code').innerHTML = html;
  },

  renderStats(v, state) {
    const { shapes } = state;
    const formatRange = (label, vals, unit) => {
      if (!vals.length) return '';
      if (vals.length === 1) return `${label}: <strong>${vals[0]} ${unit}</strong>`;
      const sorted = [...vals].sort((a,b) => a-b);
      const start = sorted[0], end = sorted[sorted.length-1];
      const step = sorted.length > 1 ? (sorted[1] - sorted[0]) : 0;
      return `${label}: <strong>${start}–${end} ${unit}</strong> (step: ${step})`;
    };
    
    const powers = [...new Set(shapes.map(s=>s.power).filter(v=>v!=null))];
    const speeds = [...new Set(shapes.map(s=>s.speed).filter(v=>v!=null))];
    const dens   = [...new Set(shapes.map(s=>s.density).filter(v=>v!=null))];
    
    v.querySelector('.s-shapes').innerHTML  = `<strong>${shapes.length}</strong> shapes`;
    v.querySelector('.s-power').innerHTML   = formatRange('Power', powers, 'pwr%');
    v.querySelector('.s-speed').innerHTML   = formatRange('Speed', speeds, 'mm/s');
    v.querySelector('.s-density').innerHTML = formatRange('Density', dens, 'lpcm');
  },

  renderProcessTree(v, state) {
    const list = v.querySelector('.process-tree');
    list.innerHTML = '';
    
    const build = (obj, depth=0) => {
      if (!obj || typeof obj !== 'object') return;
      
      Object.entries(obj).forEach(([k, val]) => {
        if (val && typeof val === 'object') {
          const id = val.id || val.processingType;
          if (id) {
            const item = document.createElement('div');
            item.className = 'tree-item';
            item.dataset.id = id;
            item.style.paddingLeft = (depth * 12) + 'px';
            const label = val.processingType ? `<span class="tree-type">${val.processingType}</span>` : `<span class="tree-id">${id}</span>`;
            item.innerHTML = `<span class="tree-key">${k}:</span> ${label}`;
            list.appendChild(item);
            build(val, depth + 1);
          } else {
            build(val, depth + 1);
          }
        }
      });
    };
    build(state.rawData.device);
  },

  onHover(v, state, idx, ev) {
    const s = state.shapes[idx];
    v.querySelectorAll('.shape-row').forEach(r => {
      const match = +r.dataset.idx===idx;
      r.classList.toggle('hl', match);
    });
    v.querySelectorAll('[data-svg-idx]').forEach(el => {
      const hit = +el.getAttribute('data-svg-idx')===idx;
      const isFill = el.getAttribute('data-is-fill') === 'true';
      if (isFill) {
        el.setAttribute('fill-opacity', hit ? '1.0' : '0.6');
        el.setAttribute('stroke', hit ? '#fff' : 'none');
        el.setAttribute('stroke-width', hit ? '2' : '0');
      } else {
        el.setAttribute('fill-opacity', hit ? '0.55' : '0.22');
        el.setAttribute('stroke-width', hit ? '2.5'  : '1.5');
      }
    });
    v.querySelectorAll('.json-display-block').forEach(b => {
      const match = +b.dataset.idx===idx;
      b.classList.toggle('json-hl', match);
    });
    Popup.show(s, ev);
  },

  onLeave(v) {
    Popup.hide();
    v.querySelectorAll('.shape-row').forEach(r => r.classList.remove('hl'));
    v.querySelectorAll('[data-svg-idx]').forEach(el => { 
      const isFill = el.getAttribute('data-is-fill') === 'true';
      if (isFill) {
        el.setAttribute('fill-opacity', '0.6');
        el.setAttribute('stroke', 'none');
        el.setAttribute('stroke-width', '0');
      } else {
        el.setAttribute('fill-opacity', '0.22');
        el.setAttribute('stroke-width', '1.5');
      }
    });
    v.querySelectorAll('.json-display-block').forEach(b => b.classList.remove('json-hl'));
  },

  exportPalette(q, state) {
    const combos = this.getUniqueCombos(state);
    const now = new Date();
    const ts = now.toISOString().replace(/[:T]/g, '-').split('.')[0];
    const def = (q('.viewer-fname').textContent || `mandala-${ts}`).replace(/\.xcs$/i, '') + '-palette.txt';
    let name = prompt("Export Palette as:", def);
    if (!name) return;
    if (!name.toLowerCase().endsWith('.txt')) name += '.txt';
    
    const params = ['power','speed','density'];
    const un = p => new Set(state.shapes.map(s=>s[p]).filter(v=>v!=null)).size;
    const sp = params.reduce((b,p) => un(p)>un(b)?p:b, params[0]);
    const lines = [`# Unique Settings — ${name}`, `# ${state.shapes.length} shapes, ${combos.length} combo(s) | sorted by ${sp}`, '',
      ` #  | Power  | Speed    | Density   | Repeat | Count | Type`,
      `----+--------+----------+-----------+--------+-------+------`];
    combos.forEach((c,i) => {
      const pw = c.power!=null?`${c.power} %`:'—';
      const sp = c.speed!=null?`${c.speed} mm/s`:'—';
      const de = c.density!=null?`${c.density} LPCM`:'—';
      lines.push(` ${String(i+1).padStart(2)} | ${pw.padEnd(6)} | ${sp.padEnd(8)} | ${de.padEnd(9)} | ${String(c.repeat).padEnd(6)} | ${String(c.count).padEnd(5)} | ${[...c.types].join(', ')}`);
    });
    dl(name, lines.join('\n'), 'text/plain');
  }
};

const TabMgr = {
  newId() { return `tab-${++App.tabCounter}-${Date.now()}`; },

  openXcs() {
    const id = this.newId();
    App.tabs.push({ id, type:'xcs', label:'Untitled.xcs' });
    const pane = XcsTab.create(id);
    document.getElementById('tabContent').appendChild(pane);
    this.activate(id);
  },

  newMandala() {
    const id = this.newId();
    const n = App.tabs.filter(t => t.type === 'mandala').length + 1;
    App.tabs.push({ id, type:'mandala', label:`Mandala ${n}` });
    const pane = MandalaTab.create(id);
    document.getElementById('tabContent').appendChild(pane);
    this.activate(id);
  },

  newGradient() {
    const id = this.newId();
    const n = App.tabs.filter(t => t.type === 'gradient').length + 1;
    App.tabs.push({ id, type:'gradient', label:`Gradient ${n}` });
    const pane = GradientTab.create(id);
    document.getElementById('tabContent').appendChild(pane);
    this.activate(id);
  },

  close(id) {
    const idx = App.tabs.findIndex(t => t.id === id);
    if (idx === -1) return;
    App.tabs.splice(idx, 1);
    const pane = document.querySelector(`.tab-pane[data-pane-id="${id}"]`);
    if (pane) pane.remove();
    delete App.instances[id];
    if (App.activeTabId === id) {
      const next = App.tabs[Math.max(0, idx - 1)];
      this.activate(next ? next.id : null);
    } else {
      this.renderTabBar();
    }
  },

  activate(id) {
    App.activeTabId = id;
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.getElementById('welcomeScreen').style.display = 'none';
    if (id) {
      const pane = document.querySelector(`.tab-pane[data-pane-id="${id}"]`);
      if (pane) pane.classList.add('active');
    } else {
      document.getElementById('welcomeScreen').style.display = 'flex';
    }
    this.renderTabBar();
  },

  setLabel(id, label) {
    const tab = App.tabs.find(t => t.id === id);
    if (tab) { tab.label = label; this.renderTabBar(); }
  },

  renderTabBar() {
    const bar = document.getElementById('tabBar');
    bar.innerHTML = '';
    App.tabs.forEach(t => {
      const el = document.createElement('div');
      el.className = 'tab' + (t.id === App.activeTabId ? ' active' : '');
      el.innerHTML = `<span class="tab-icon">${t.type === 'xcs' ? '📄' : '✦'}</span><span class="tab-label">${esc(t.label)}</span><span class="tab-close" title="Close">×</span>`;
      el.querySelector('.tab-label').addEventListener('click', () => this.activate(t.id));
      el.querySelector('.tab-icon').addEventListener('click', () => this.activate(t.id));
      el.querySelector('.tab-close').addEventListener('click', e => { e.stopPropagation(); this.close(t.id); });
      bar.appendChild(el);
    });
  }
};

// PALETTE MANAGER
// ═══════════════════════════════════════════════════════════════════
const PalMgr = {
  async load() {
    for (const id of PALETTE_FILES) {
      try {
        const r = await fetch(`palettes/${id}.json`);
        if (!r.ok) throw new Error();
        const data = await r.json();
        App.palettes[data.id || id] = data;
      } catch {
        if (FALLBACK_PALETTES[id]) App.palettes[id] = FALLBACK_PALETTES[id];
      }
    }
  },
  list() { return Object.values(App.palettes); },
  get(id) { return App.palettes[id] || null; },
  entryColor(paletteId, idx) {
    const p = this.get(paletteId);
    return (p && p.entries[idx]) ? p.entries[idx].rgb : '#5b9bd5';
  },
  fillEntrySelect(sel, paletteId, currentIdx) {
    sel.innerHTML = '';
    const p = this.get(paletteId);
    if (!p) { sel.innerHTML = '<option value="0">— no palette —</option>'; return; }
    p.entries.forEach((e, i) => {
      const opt = document.createElement('option');
      opt.value = i; opt.textContent = `${e.label} (${e.power}%)`;
      if (i === currentIdx) opt.selected = true;
      sel.appendChild(opt);
    });
  },
  fillPaletteSelect(sel, currentId) {
    sel.innerHTML = '<option value="">— none —</option>';
    this.list().forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.id; opt.textContent = p.name;
      if (p.id === currentId) opt.selected = true;
      sel.appendChild(opt);
    });
  }
};

// XCS TAB (OPEN FILE)
// ═══════════════════════════════════════════════════════════════════
const XcsTab = {
  create(tabId) {
    const pane = document.createElement('div');
    pane.className = 'tab-pane';
    pane.dataset.paneId = tabId;
    pane.innerHTML = `
      <div class="drop-zone">
        <div class="drop-zone-icon">📂</div>
        <div class="drop-zone-title">Drop an .xcs file here</div>
        <div class="drop-zone-sub">or click to browse</div>
        <input type="file" class="file-input" accept=".xcs,.json" style="display:none">
      </div>`;
    
    const viewer = XCSViewer.create(tabId);
    pane.appendChild(viewer);

    const q = s => pane.querySelector(s);
    const state = { rawData:null, shapes:[] };
    App.instances[tabId] = { type:'xcs', pane, state };

    q('.drop-zone').addEventListener('click', () => q('.file-input').click());
    q('.file-input').addEventListener('change', e => { if (e.target.files[0]) this.loadFile(tabId, pane, state, e.target.files[0]); });
    
    pane.addEventListener('dragover', e => { e.preventDefault(); q('.drop-zone').classList.add('over'); });
    pane.addEventListener('dragleave', e => { if (!pane.contains(e.relatedTarget)) q('.drop-zone').classList.remove('over'); });
    pane.addEventListener('drop', e => {
      e.preventDefault(); q('.drop-zone').classList.remove('over');
      const f = e.dataTransfer.files[0]; if (f) this.loadFile(tabId, pane, state, f);
    });

    return pane;
  },

  loadFile(tabId, pane, state, file) {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        state.rawData = JSON.parse(e.target.result);
        state.shapes  = this.parseXCS(state.rawData);
        pane.querySelector('.drop-zone').style.display = 'none';
        pane.querySelector('.viewer-fname').textContent = file.name;
        TabMgr.setLabel(tabId, file.name);
        XCSViewer.update(pane, state);
      } catch(err) { alert('Parse error:\n' + err.message); }
    };
    reader.readAsText(file);
  },

  parseXCS(data) {
    const canvas = data.canvas[0];
    const dvEntry = Object.fromEntries(data.device.data.value)[canvas.id];
    const dispMap = Object.fromEntries(dvEntry.displays.value);
    return canvas.displays.map((d, i) => {
      const cfg = dispMap[d.id] || {};
      const pt = cfg.processingType || '';
      const pm = (pt && cfg.data?.[pt]) ? (cfg.data[pt].parameter?.customize || {}) : {};
      return { idx:i, id:d.id, type:d.type, x:d.x, y:d.y, w:d.width, h:d.height,
               angle:d.angle||0, layerColor:d.layerColor||'#5b9bd5', zOrder:d.zOrder||0,
               processingType:pt, power:pm.power??null, speed:pm.speed??null,
               density:pm.density??null, repeat:pm.repeat??1,
               laser: pm.processingLightSource || null, hideLabels: !!d.hideLabels };
    });
  }
};

function defaultRing(i) {
  return { dotDiameter:3, shape:'circle', countMode:'auto', countMultiplier:1, countManual:8, rotationOffset:0, paletteEntryIndex: i % 21 };
}
function defaultConfig() {
  return { symmetry:8, ringCount:4, totalDiameter:80, innerMargin:8, spacingMode:'equal',
           centerDot:false, centerDotDiameter:3, centerDotEntry:0,
           alternateRotation:false, paletteId:'laFont-1000lpcm', spiralPalette:false,
           dotScaling:0, ringSpiral:0,
           rings: [0,1,2,3].map(defaultRing) };
}

const MandalaTab = {
  create(tabId) {
    const pane = document.createElement('div');
    pane.className = 'tab-pane';
    pane.dataset.paneId = tabId;
    pane.innerHTML = `
      <div class="left-tool-panel">
        <div class="tool-header"><span class="tool-title">Mandala</span></div>
        <div class="tool-scroll"></div>
      </div>`;

    const viewer = XCSViewer.create(tabId);
    viewer.querySelector('.viewer-fname').textContent = 'Mandala Design';
    pane.appendChild(viewer);

    const cfg = defaultConfig();
    const state = { rawData:null, shapes:[] };
    App.instances[tabId] = { type:'mandala', pane, cfg, state };

    this.renderControls(tabId);
    this.refresh(tabId);
    return pane;
  },

  refresh(tabId, lazy = false) {
    const inst = App.instances[tabId];
    inst.state.rawData = this.generateXCS(inst.cfg);
    inst.state.shapes = XcsTab.parseXCS(inst.state.rawData);
    XCSViewer.update(inst.pane, inst.state, lazy);
  },

  generateXCS(cfg) {
    const canvasId = uuid();
    const displays = [];
    const displayValues = [];
    const palette = PalMgr.get(cfg.paletteId);
    const usedColors = new Set();
    const CX = 50, CY = 50;

    // Detect laser type from palette
    const isIR = palette.laser === 'ir' || palette.name.toUpperCase().includes('IR');
    const laserType = isIR ? 'ir' : 'blue';

    const addShape = (lx, ly, r, type, color, entry) => {
      const id = uuid();
      const x = CX + lx, y = CY + ly;
      usedColors.add(color);

      displays.push({ 
        id, name: null, type: type === 'circle' ? 'CIRCLE' : 'RECT', 
        x, y, width: r*2, height: r*2, angle: 0,
        scale: { x: 1, y: 1 }, skew: { x: 0, y: 0 }, 
        pivot: { x: 0, y: 0 }, localSkew: { x: 0, y: 0 },
        offsetX: x, offsetY: y, lockRatio: false, isClosePath: true,
        zOrder: displays.length, sourceId: id, groupTag: "", layerTag: color,
        layerColor: color, visible: true, originColor: "#000000",
        enableTransform: true, visibleState: true, lockState: false,
        resourceOrigin: "", customData: {}, rootComponentId: "", minCanvasVersion: "0.0.0",
        fill: { paintType: "color", visible: false, color: 0, alpha: 1 },
        stroke: { 
          paintType: "color", visible: true, color: 0, alpha: 1, width: 1,
          cap: "butt", join: "miter", miterLimit: 4, alignment: 0.5 
        },
        isFill: true, lineColor: 0, fillColor: color
      });
      
      const pt = "COLOR_FILL_ENGRAVE";
      const pm = entry ? { 
        power: entry.power, speed: palette.speed, density: palette.lpcm, repeat: 1,
        processingLightSource: laserType, bitmapScanMode: "zMode", needGapNumDensity: true,
        dotDuration: 100, dpi: 500, enableKerf: false, kerfDistance: 0
      } : { power: 20, speed: 200, density: 100, repeat: 1, processingLightSource: laserType };
      
      // Mandatory nodes for F2 sliders to appear
      const nodes = {
        VECTOR_CUTTING: { materialType: "customize", planType: laserType, parameter: { customize: { power: 1, speed: 16, repeat: 1, processingLightSource: laserType } } },
        VECTOR_ENGRAVING: { materialType: "customize", planType: laserType, parameter: { customize: { power: 1, speed: 20, repeat: 1, processingLightSource: laserType } } },
        FILL_VECTOR_ENGRAVING: { materialType: "customize", planType: laserType, parameter: { customize: pm } },
        COLOR_FILL_ENGRAVE: { materialType: "customize", planType: laserType, parameter: { customize: pm } },
        INTAGLIO: { materialType: "customize", planType: laserType, parameter: { customize: { power: 1, speed: 80, repeat: 1, processingLightSource: laserType } } }
      };

      displayValues.push([id, { 
        isFill: true, type: type === 'circle' ? 'CIRCLE' : 'RECT',
        processingType: pt, processIgnore: false, isWhiteModel: false,
        data: nodes
      }]);
    };

    const radii = this.computeRadii(cfg);
    cfg.rings.forEach((ring, i) => {
      if (i >= cfg.ringCount) return;
      const r = radii[i];
      const count = ring.countMode === 'auto' ? cfg.symmetry * ring.countMultiplier : ring.countManual;
      const entryIdx = cfg.spiralPalette ? (ring.paletteEntryIndex + i) % palette.entries.length : ring.paletteEntryIndex;
      const entry = palette.entries[entryIdx];
      const scale = 1 + (cfg.dotScaling * i);
      const diam = Math.max(0.1, ring.dotDiameter * scale);
      const halfStep = cfg.alternateRotation && i % 2 === 1 ? (180 / count) : 0;
      const spiralOffset = cfg.ringSpiral * i;
      for (let j = 0; j < count; j++) {
        const ang = ((360/count)*j + ring.rotationOffset + halfStep + spiralOffset) * Math.PI / 180;
        addShape(Math.cos(ang) * r, Math.sin(ang) * r, diam/2, ring.shape, entry.rgb, entry);
      }
    });

    if (cfg.centerDot) {
      const entry = palette.entries[cfg.centerDotEntry];
      addShape(0, 0, cfg.centerDotDiameter/2, 'circle', entry.rgb, entry);
    }

    const layerData = {};
    [...usedColors].forEach((c, idx) => {
      layerData[c] = { name: `Layer ${idx+1}`, order: idx+1, visible: true };
    });

    return {
      canvasId: canvasId,
      canvas: [{ 
        id: canvasId, title: "{panel}1", 
        layerData,
        groupData: {}, displays 
      }],
      device: { 
        id: "GS006",
        power: [5, 15],
        data: { 
          dataType: "Map", 
          value: [[canvasId, { 
            mode: "LASER_PLANE",
            data: {
              LASER_PLANE: {
                material: 0, lightSourceMode: laserType, thickness: null,
                perimeter: null, diameter: null, isProcessByLayer: false,
                pathPlanning: "auto", fillPlanning: "separate", dreedyTsp: false,
                avoidSmokeModal: false, scanDirection: "topToBottom",
                enableOddEvenKerf: true, xcsUsed: []
              }
            },
            displays: { dataType: "Map", value: displayValues } 
          }]] 
        } 
      },
      extId: "GS006",
      extName: "F2",
      version: "1.5.8",
      minRequiredVersion: "2.6.0",
      created: Date.now(),
      modify: Date.now(),
      projectTraceID: uuid()
    };
  },
  computeRadii(cfg) {
    const { ringCount, totalDiameter, innerMargin, spacingMode } = cfg;
    const outerRadius = totalDiameter / 2;
    const usable = outerRadius - innerMargin;
    if (spacingMode === 'equal') return Array.from({length:ringCount}, (_,i) => innerMargin + usable*(i+1)/ringCount);
    if (spacingMode === 'golden') {
      const phi = 1.618033988749895;
      const w = Array.from({length:ringCount}, (_,i) => Math.pow(phi,i));
      const tot = w.reduce((s,v)=>s+v,0);
      let cum = 0; return w.map(v => { cum += v; return innerMargin + usable*cum/tot; });
    }
    if (spacingMode === 'fibonacci') {
      let a=1,b=1, fibs=[1];
      for (let i=1;i<ringCount;i++){[a,b]=[b,a+b];fibs.push(a);}
      const tot = fibs.reduce((s,v)=>s+v,0);
      let cum = 0; return fibs.map(v => { cum += v; return innerMargin + usable*cum/tot; });
    }
    return Array.from({length:ringCount}, (_,i) => innerMargin + usable*(i+1)/ringCount);
  },

  renderControls(tabId) {
    const { pane, cfg } = App.instances[tabId];
    const scroll = pane.querySelector('.tool-scroll');
    scroll.innerHTML = '';

    const update = (lazy = false) => this.refresh(tabId, lazy);

    const set = (path, val) => {
      const parts = path.split('.');
      let obj = cfg;
      for (let i = 0; i < parts.length - 1; i++) obj = obj[parts[i]];
      obj[parts[parts.length-1]] = val;
      if (path === 'ringCount') {
        while (cfg.rings.length < cfg.ringCount) cfg.rings.push(defaultRing(cfg.rings.length));
        this.renderControls(tabId);
        update(false);
      } else {
        update(true);
      }
    };

    // ── Global section ──
    const globalSec = this.makeSection('Global', [
      this.makeRow('Palette', this.makePaletteSelect(cfg, (v) => { cfg.paletteId = v; this.renderControls(tabId); update(); })),
      this.makeToggleRow('Spiral Palette', cfg.spiralPalette, v => { cfg.spiralPalette = v; update(); }),
      this.makeRow('Size (Ø)', this.makeRange(10, 300, 1, cfg.totalDiameter, v => set('totalDiameter', +v), 'mm')),
      this.makeRow('Ring Scale', this.makeRange(-0.5, 0.5, 0.05, cfg.dotScaling, v => set('dotScaling', +v), '×')),
      this.makeRow('Ring Spiral', this.makeRange(-45, 45, 1, cfg.ringSpiral, v => set('ringSpiral', +v), '°')),
      this.makeRow('Symmetry', this.makeStepCounter(cfg.symmetry, 2, 48, v => set('symmetry', +v))),
      this.makeRow('Rings', this.makeStepCounter(cfg.ringCount, 1, 12, (v) => { cfg.ringCount = v; while(cfg.rings.length<v) cfg.rings.push(defaultRing(cfg.rings.length)); this.renderControls(tabId); update(); })),
      this.makeRow('Inner margin', this.makeRange(0, 40, 0.5, cfg.innerMargin, v => set('innerMargin', +v), 'mm')),
      this.makeRow('Spacing', this.makeSelect(['equal','golden','fibonacci'], cfg.spacingMode, v => set('spacingMode', v))),
      this.makeToggleRow('Alt rotate', cfg.alternateRotation, v => set('alternateRotation', v)),
      this.makeCenterDotSection(cfg, tabId),
    ]);
    scroll.appendChild(globalSec);

    // ── Per-ring sections ──
    for (let i = 0; i < cfg.ringCount; i++) {
      const ring = cfg.rings[i];
      const sec = this.makeSection(`Ring ${i+1}`, [
        this.makeRow('Color', this.makeEntryPicker(cfg.paletteId, ring.paletteEntryIndex, (v) => { ring.paletteEntryIndex = +v; update(true); })),
        this.makeRow('Dot size', this.makeRange(0.3, 8, 0.1, ring.dotDiameter, v => { ring.dotDiameter = +v; update(true); }, 'mm')),
        this.makeRow('Shape', this.makeSelect(['circle','ring','diamond','cross','petal'], ring.shape, v => { ring.shape = v; update(true); })),
        this.makeCountRow(ring, (mode, val) => { ring.countMode = mode; if (mode==='auto') ring.countMultiplier=val; else ring.countManual=val; update(true); }, cfg.symmetry),
        this.makeRow('Rotation', this.makeRange(0, 360, 1, ring.rotationOffset, v => { ring.rotationOffset = +v; update(true); }, '°')),
      ], true);
      scroll.appendChild(sec);
    }
  },

  makeSection(title, children, collapsed, headerControl) {
    const sec = document.createElement('div');
    sec.className = 'ctrl-section';
    const hdr = document.createElement('div');
    hdr.className = 'ctrl-section-title';
    hdr.style.display = 'flex';
    hdr.style.alignItems = 'center';
    
    const label = document.createElement('span');
    label.textContent = title;
    hdr.appendChild(label);

    if (headerControl) {
      headerControl.style.marginLeft = 'auto';
      headerControl.style.marginRight = '8px';
      headerControl.addEventListener('click', e => e.stopPropagation());
      hdr.appendChild(headerControl);
    } else {
      const spacer = document.createElement('div');
      spacer.style.flex = '1';
      hdr.appendChild(spacer);
    }

    const arrow = document.createElement('span');
    arrow.style.cssText = 'color:#333;font-size:9px';
    arrow.textContent = collapsed ? '▸' : '▾';
    hdr.appendChild(arrow);

    const body = document.createElement('div');
    body.className = 'ctrl-section-body' + (collapsed ? ' collapsed' : '');
    hdr.addEventListener('click', () => {
      const isOpen = !body.classList.contains('collapsed');
      body.classList.toggle('collapsed', isOpen);
      arrow.textContent = isOpen ? '▸' : '▾';
    });
    children.forEach(c => { if (c) body.appendChild(c); });
    sec.appendChild(hdr);
    sec.appendChild(body);
    return sec;
  },

  makeRow(label, control) {
    const row = document.createElement('div');
    row.className = 'ctrl-row';
    const lbl = document.createElement('span');
    lbl.className = 'ctrl-label'; lbl.textContent = label;
    row.appendChild(lbl); row.appendChild(control);
    return row;
  },

  makeRange(min, max, step, val, onChange, unit='') {
    const wrap = document.createElement('div');
    wrap.className = 'ctrl-val-wrap';
    const inp = document.createElement('input');
    inp.type = 'range'; inp.min = min; inp.max = max; inp.step = step; inp.value = val;
    const disp = document.createElement('span');
    disp.className = 'range-val'; disp.textContent = val + unit;
    inp.addEventListener('input', () => { disp.textContent = inp.value + unit; onChange(inp.value); });
    wrap.appendChild(inp); wrap.appendChild(disp);
    return wrap;
  },

  makeSelect(options, current, onChange) {
    const sel = document.createElement('select');
    sel.className = 'ctrl-select';
    options.forEach(o => {
      const opt = document.createElement('option');
      opt.value = o; opt.textContent = o;
      if (String(o) === String(current)) opt.selected = true;
      sel.appendChild(opt);
    });
    sel.addEventListener('change', () => onChange(sel.value));
    return sel;
  },

  makeToggles(options, current, onChange, labels = {}) {
    const wrap = document.createElement('div');
    wrap.style.display = 'flex';
    wrap.style.gap = '4px';
    options.forEach(o => {
      const btn = document.createElement('button');
      btn.className = 'hbtn sm' + (String(o) === String(current) ? ' primary' : '');
      btn.textContent = labels[o] || o;
      btn.addEventListener('click', () => {
        if (String(o) === String(current)) return;
        onChange(o);
      });
      wrap.appendChild(btn);
    });
    return wrap;
  },

  makePaletteSelect(cfg, onChange) {
    const sel = document.createElement('select');
    sel.className = 'ctrl-select';
    PalMgr.fillPaletteSelect(sel, cfg.paletteId);
    sel.addEventListener('change', () => onChange(sel.value));
    return sel;
  },

  makeEntryPicker(paletteId, currentIdx, onChange) {
    const wrap = document.createElement('div');
    wrap.className = 'entry-picker';
    const swatch = document.createElement('div');
    swatch.className = 'entry-swatch';
    swatch.style.background = PalMgr.entryColor(paletteId, currentIdx);
    const sel = document.createElement('select');
    sel.className = 'entry-select';
    PalMgr.fillEntrySelect(sel, paletteId, currentIdx);
    sel.addEventListener('change', () => {
      swatch.style.background = PalMgr.entryColor(paletteId, +sel.value);
      onChange(sel.value);
    });
    wrap.appendChild(swatch); wrap.appendChild(sel);
    return wrap;
  },

  makeToggleRow(label, val, onChange) {
    const row = document.createElement('div');
    row.className = 'ctrl-row';
    const lbl = document.createElement('label');
    lbl.className = 'ctrl-toggle';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = val;
    cb.addEventListener('change', () => onChange(cb.checked));
    lbl.appendChild(cb);
    lbl.appendChild(document.createTextNode(' ' + label));
    const lsp = document.createElement('span');
    lsp.className = 'ctrl-label';
    row.appendChild(lsp); row.appendChild(lbl);
    return row;
  },

  makeCenterDotSection(cfg, tabId) {
    const frag = document.createDocumentFragment();
    const toggleRow = document.createElement('div');
    toggleRow.className = 'ctrl-row';
    const lbl = document.createElement('label');
    lbl.className = 'ctrl-toggle';
    const cb = document.createElement('input');
    cb.type = 'checkbox'; cb.checked = cfg.centerDot;
    cb.addEventListener('change', () => {
      cfg.centerDot = cb.checked;
      sizeRow.style.display = cfg.centerDot ? 'flex' : 'none';
      colorRow.style.display = cfg.centerDot ? 'flex' : 'none';
      this.refresh(tabId, true);
    });
    lbl.appendChild(cb); lbl.appendChild(document.createTextNode(' Center dot'));
    const lsp = document.createElement('span');
    lsp.className = 'ctrl-label';
    toggleRow.appendChild(lsp); toggleRow.appendChild(lbl);
    frag.appendChild(toggleRow);

    const sizeRow = this.makeRow('Size', this.makeRange(0.5, 10, 0.1, cfg.centerDotDiameter, v => { cfg.centerDotDiameter = +v; this.refresh(tabId, true); }, 'mm'));
    sizeRow.style.display = cfg.centerDot ? 'flex' : 'none';
    frag.appendChild(sizeRow);

    const colorRow = this.makeRow('Color', this.makeEntryPicker(cfg.paletteId, cfg.centerDotEntry, v => { cfg.centerDotEntry = +v; this.refresh(tabId, true); }));
    colorRow.style.display = cfg.centerDot ? 'flex' : 'none';
    frag.appendChild(colorRow);

    return frag;
  },

  makeStepCounter(current, min, max, onChange, step = 1) {
    const wrap = document.createElement('div');
    wrap.className = 'ring-counter';
    const minus = document.createElement('button');
    minus.className = 'hbtn sm'; minus.textContent = '−';
    const val = document.createElement('span');
    val.className = 'ring-counter-val'; val.textContent = current;
    const plus = document.createElement('button');
    plus.className = 'hbtn sm'; plus.textContent = '+';
    minus.addEventListener('click', () => { if (current > min) { current -= step; if (current < min) current = min; val.textContent = current; onChange(current); } });
    plus.addEventListener('click',  () => { if (current < max) { current += step; if (current > max) current = max; val.textContent = current; onChange(current); } });
    wrap.appendChild(minus); wrap.appendChild(val); wrap.appendChild(plus);
    return wrap;
  },

  makeCountRow(ring, onChange, symmetry) {
    const wrap = document.createElement('div');
    wrap.style.flex = '1';
    const modeWrap = document.createElement('div');
    modeWrap.style.cssText = 'display:flex;gap:4px;margin-bottom:4px';
    const autoBtn = document.createElement('button');
    autoBtn.className = 'hbtn sm' + (ring.countMode==='auto'?' primary':'');
    autoBtn.textContent = 'Auto';
    const manBtn = document.createElement('button');
    manBtn.className = 'hbtn sm' + (ring.countMode==='manual'?' primary':'');
    manBtn.textContent = 'Manual';
    const countDisplay = document.createElement('span');
    countDisplay.style.cssText = 'font-size:11px;color:#777;padding:2px 6px';
    const updateDisplay = () => {
      const n = ring.countMode==='auto' ? symmetry * ring.countMultiplier : ring.countManual;
      countDisplay.textContent = `= ${n} dots`;
    };
    updateDisplay();
    const autoRow = document.createElement('div');
    autoRow.style.cssText = 'display:flex;align-items:center;gap:6px;' + (ring.countMode==='manual'?'display:none!important':'');
    const multSel = document.createElement('select');
    multSel.className = 'ctrl-select';
    [1,2,3,4].forEach(v => { const o = document.createElement('option'); o.value=v; o.textContent=`×${v}`; if(v===ring.countMultiplier)o.selected=true; multSel.appendChild(o); });
    multSel.addEventListener('change', () => { ring.countMultiplier = +multSel.value; updateDisplay(); onChange('auto', +multSel.value); });
    autoRow.appendChild(document.createTextNode('×'));
    autoRow.appendChild(multSel);
    const manRow = document.createElement('div');
    manRow.style.cssText = 'display:' + (ring.countMode==='auto'?'none':'flex') + ';align-items:center;gap:6px';
    const countInp = document.createElement('input');
    countInp.type = 'number'; countInp.className = 'ctrl-number'; countInp.min = 1; countInp.max = 200; countInp.value = ring.countManual;
    countInp.addEventListener('input', () => { ring.countManual = +countInp.value; updateDisplay(); onChange('manual', +countInp.value); });
    manRow.appendChild(countInp);
    autoBtn.addEventListener('click', () => {
      ring.countMode = 'auto'; autoBtn.className='hbtn sm primary'; manBtn.className='hbtn sm';
      autoRow.style.display='flex'; manRow.style.display='none'; updateDisplay(); onChange('auto', ring.countMultiplier);
    });
    manBtn.addEventListener('click', () => {
      ring.countMode = 'manual'; autoBtn.className='hbtn sm'; manBtn.className='hbtn sm primary';
      autoRow.style.display='none'; manRow.style.display='flex'; updateDisplay(); onChange('manual', ring.countManual);
    });
    modeWrap.appendChild(autoBtn); modeWrap.appendChild(manBtn); modeWrap.appendChild(countDisplay);
    wrap.appendChild(modeWrap); wrap.appendChild(autoRow); wrap.appendChild(manRow);
    const outer = document.createElement('div');
    outer.className = 'ctrl-row';
    const lbl = document.createElement('span'); lbl.className = 'ctrl-label'; lbl.textContent = 'Count';
    outer.appendChild(lbl); outer.appendChild(wrap);
    return outer;
  }
};

// GRADIENT TAB
// ═══════════════════════════════════════════════════════════════════
const GradientTab = {
  create(tabId) {
    const pane = document.createElement('div');
    pane.className = 'tab-pane';
    pane.dataset.paneId = tabId;
    pane.innerHTML = `
      <div class="left-tool-panel">
        <div class="tool-header"><span class="tool-title">Gradient Test</span></div>
        <div class="tool-scroll"></div>
      </div>`;

    const viewer = XCSViewer.create(tabId);
    viewer.querySelector('.viewer-fname').textContent = 'Gradient Test Grid';
    pane.appendChild(viewer);

    const cfg = {
      laserType: 'ir',
      xAxis: 'power', yAxis: 'speed', fixedAxis: 'lpcm',
      roleHistory: ['fixedAxis', 'yAxis', 'xAxis'], // most recent at end
      xMin: 10, xMax: 100,
      yMin: 10, yMax: 200,
      resolution: 20,
      overlap: 0,
      fixedPower: 20, fixedSpeed: 100, fixedLpcm: 1000,
      totalSize: 20
    };
    const state = { rawData:null, shapes:[] };
    App.instances[tabId] = { type:'gradient', pane, cfg, state };

    this.renderControls(tabId);
    this.refresh(tabId);
    return pane;
  },

  refresh(tabId, lazy = false) {
    const inst = App.instances[tabId];
    inst.state.rawData = this.generateXCS(inst.cfg);
    inst.state.shapes = XcsTab.parseXCS(inst.state.rawData);
    XCSViewer.update(inst.pane, inst.state, lazy);
  },

  generateXCS(cfg) {
    const canvasId = uuid();
    const displays = [];
    const displayValues = [];
    const CX = 50, CY = 50;
    const { resolution, totalSize, laserType, xAxis, yAxis, overlap } = cfg;
    
    const tileSize = totalSize / resolution;
    const startX = CX - totalSize/2;
    const startY = CY - totalSize/2;

    for (let iy = 0; iy < resolution; iy++) {
      for (let ix = 0; ix < resolution; ix++) {
        const id = uuid();
        const x = startX + ix * tileSize + tileSize/2;
        const y = startY + iy * tileSize + tileSize/2;
        
        const getVal = (axis) => {
          let minVal, maxVal, stepIdx;
          if (axis === cfg.xAxis) { minVal = cfg.xMin; maxVal = cfg.xMax; stepIdx = ix; }
          else if (axis === cfg.yAxis) { minVal = cfg.yMin; maxVal = cfg.yMax; stepIdx = iy; }
          else { return axis === 'power' ? cfg.fixedPower : axis === 'speed' ? cfg.fixedSpeed : cfg.fixedLpcm; }
          
          if (resolution === 1) return minVal;
          return minVal + (maxVal - minVal) * stepIdx / (resolution - 1);
        };

        const p = getVal('power');
        const s = getVal('speed');
        const d = getVal('lpcm');

        displays.push({ 
          id, name: null, type: 'RECT', x, y, width: tileSize + overlap, height: tileSize + overlap, angle: 0,
          scale: { x: 1, y: 1 }, skew: { x: 0, y: 0 }, pivot: { x: 0, y: 0 }, localSkew: { x: 0, y: 0 },
          offsetX: x, offsetY: y, lockRatio: false, isClosePath: true,
          zOrder: displays.length, sourceId: id, groupTag: "", layerTag: "#5b9bd5",
          layerColor: "#5b9bd5", visible: true, originColor: "#000000",
          enableTransform: true, visibleState: true, lockState: false,
          resourceOrigin: "", customData: {}, rootComponentId: "", minCanvasVersion: "0.0.0",
          fill: { paintType: "color", visible: false, color: 0, alpha: 1 },
          stroke: { paintType: "color", visible: true, color: 0, alpha: 1, width: 1, cap: "butt", join: "miter", miterLimit: 4, alignment: 0.5 },
          isFill: true, lineColor: 0, fillColor: "#5b9bd5", hideLabels: true, power: null
        });

        const pm = { 
          power: Math.round(p), speed: Math.round(s), density: Math.round(d), repeat: 1,
          processingLightSource: laserType, bitmapScanMode: "zMode", needGapNumDensity: true,
          dotDuration: 100, dpi: 500, enableKerf: false, kerfDistance: 0
        };
        
        const nodes = {
          VECTOR_CUTTING: { materialType: "customize", planType: laserType, parameter: { customize: { power: 1, speed: 16, repeat: 1, processingLightSource: laserType } } },
          VECTOR_ENGRAVING: { materialType: "customize", planType: laserType, parameter: { customize: { power: 1, speed: 20, repeat: 1, processingLightSource: laserType } } },
          FILL_VECTOR_ENGRAVING: { materialType: "customize", planType: laserType, parameter: { customize: pm } },
          COLOR_FILL_ENGRAVE: { materialType: "customize", planType: laserType, parameter: { customize: pm } },
          INTAGLIO: { materialType: "customize", planType: laserType, parameter: { customize: { power: 1, speed: 80, repeat: 1, processingLightSource: laserType } } }
        };

        displayValues.push([id, { isFill: true, type: 'RECT', processingType: "COLOR_FILL_ENGRAVE", processIgnore: false, isWhiteModel: false, data: nodes }]);
      }
    }

    return {
      canvasId: canvasId,
      canvas: [{ id: canvasId, title: "{panel}1", layerData: {"#5b9bd5": {name:"Grid", order:1, visible:true}}, groupData: {}, displays }],
      device: { id: "GS006", power: [5, 15], data: { dataType: "Map", value: [[canvasId, { mode: "LASER_PLANE", data: { LASER_PLANE: { material: 0, lightSourceMode: laserType, thickness: null, perimeter: null, diameter: null, isProcessByLayer: false, pathPlanning: "auto", fillPlanning: "separate", dreedyTsp: false, avoidSmokeModal: false, scanDirection: "topToBottom", enableOddEvenKerf: true, xcsUsed: [] } }, displays: { dataType: "Map", value: displayValues } }]] } },
      extId: "GS006", extName: "F2", version: "1.5.8", minRequiredVersion: "2.6.0", created: Date.now(), modify: Date.now(), projectTraceID: uuid()
    };
  },

  renderControls(tabId) {
    const { pane, cfg } = App.instances[tabId];
    const scroll = pane.querySelector('.tool-scroll');
    scroll.innerHTML = '';
    const update = (lazy = false) => this.refresh(tabId, lazy);
    const set = (path, val) => { cfg[path] = val; update(true); };

    const axisLabels = { power: 'pwr%', speed: 'mm/s', lpcm: 'lpcm' };
    const axisOpts = ['power', 'speed', 'lpcm'];

    const swapAxes = (targetRole, newValue) => {
      let currentRoleOfValue = null;
      if (cfg.xAxis === newValue) currentRoleOfValue = 'xAxis';
      else if (cfg.yAxis === newValue) currentRoleOfValue = 'yAxis';
      else if (cfg.fixedAxis === newValue) currentRoleOfValue = 'fixedAxis';
      
      if (!currentRoleOfValue || currentRoleOfValue === targetRole) return;

      const oldValueOfTargetRole = cfg[targetRole];
      cfg[targetRole] = newValue;
      cfg[currentRoleOfValue] = oldValueOfTargetRole;
      
      cfg.roleHistory = cfg.roleHistory.filter(r => r !== targetRole);
      cfg.roleHistory.push(targetRole);
      
      this.renderControls(tabId);
      update();
    };

    scroll.appendChild(MandalaTab.makeSection('Global', [
      MandalaTab.makeRow('Laser', MandalaTab.makeToggles(['ir', 'blue'], cfg.laserType, v => set('laserType', v), {ir:'IR', blue:'BLUE'})),
      MandalaTab.makeRow('Resolution', MandalaTab.makeStepCounter(cfg.resolution, 20, 100, v => set('resolution', v), 5)),
      MandalaTab.makeRow('Overall Size', MandalaTab.makeRange(10, 100, 5, cfg.totalSize, v => set('totalSize', +v), 'mm')),
      MandalaTab.makeRow('Overlap', MandalaTab.makeRange(0, 1, 0.05, cfg.overlap, v => set('overlap', +v), 'mm'))
    ]));

    const getRanges = (axis) => {
      if (axis === 'power') return { min: 1, max: 100, step: 1, unit: 'pwr%' };
      if (axis === 'speed') return { min: 1, max: 500, step: 5, unit: 'mm/s' };
      return { min: 10, max: 1000, step: 50, unit: 'lpcm' };
    };

    const xr = getRanges(cfg.xAxis);
    scroll.appendChild(MandalaTab.makeSection('X Axis:', [
      MandalaTab.makeRow(`Min (${xr.unit})`, MandalaTab.makeRange(xr.min, xr.max, xr.step, cfg.xMin, v => set('xMin', +v), xr.unit)),
      MandalaTab.makeRow(`Max (${xr.unit})`, MandalaTab.makeRange(xr.min, xr.max, xr.step, cfg.xMax, v => set('xMax', +v), xr.unit))
    ], false, MandalaTab.makeToggles(axisOpts, cfg.xAxis, v => swapAxes('xAxis', v), axisLabels)));

    const yr = getRanges(cfg.yAxis);
    scroll.appendChild(MandalaTab.makeSection('Y Axis:', [
      MandalaTab.makeRow(`Min (${yr.unit})`, MandalaTab.makeRange(yr.min, yr.max, yr.step, cfg.yMin, v => set('yMin', +v), yr.unit)),
      MandalaTab.makeRow(`Max (${yr.unit})`, MandalaTab.makeRange(yr.min, yr.max, yr.step, cfg.yMax, v => set('yMax', +v), yr.unit))
    ], false, MandalaTab.makeToggles(axisOpts, cfg.yAxis, v => swapAxes('yAxis', v), axisLabels)));

    const fr = getRanges(cfg.fixedAxis);
    const fixedKey = cfg.fixedAxis === 'power' ? 'fixedPower' : cfg.fixedAxis === 'speed' ? 'fixedSpeed' : 'fixedLpcm';
    scroll.appendChild(MandalaTab.makeSection('Fixed:', [
      MandalaTab.makeRow(`Value (${fr.unit})`, MandalaTab.makeRange(fr.min, fr.max, fr.step, cfg[fixedKey], v => set(fixedKey, +v), fr.unit))
    ], false, MandalaTab.makeToggles(axisOpts, cfg.fixedAxis, v => swapAxes('fixedAxis', v), axisLabels)));
  }
};

// ═══════════════════════════════════════════════════════════════════
// UTILITIES
// ═══════════════════════════════════════════════════════════════════
function uuid() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0, v = c === 'x' ? r : (r & 0x3 | 0x8);
    return v.toString(16);
  });
}

function svgEl(tag, attrs) {
  const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
  for (const [k,v] of Object.entries(attrs)) el.setAttribute(k,v);
  return el;
}
function syntaxHL(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/("(\\u[\dA-Fa-f]{4}|\\[^u]|[^\\"])*")\s*:/g,'<span class="j-key">$1</span>:')
    .replace(/("(\\u[\dA-Fa-f]{4}|\\[^u]|[^\\"])*")/g,'<span class="j-str">$1</span>')
    .replace(/\b(-?\d+\.?\d*(?:[eE][+-]?\d+)?)\b/g,'<span class="j-num">$1</span>')
    .replace(/\b(true|false)\b/g,'<span class="j-bool">$1</span>')
    .replace(/\bnull\b/g,'<span class="j-null">null</span>');
}
function esc(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function dl(filename, content, mime) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], {type:mime}));
  a.download = filename; a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

// ═══════════════════════════════════════════════════════════════════
// POPUP HELPER
// ═══════════════════════════════════════════════════════════════════
const Popup = {
  show(s, ev) {
    const p = document.getElementById('globalPopup');
    document.getElementById('gpTitle').textContent   = `${s.type} #${s.idx+1}`;
    document.getElementById('gpPower').textContent   = s.power   != null ? s.power   + ' pwr%'   : '—';
    document.getElementById('gpSpeed').textContent   = s.speed   != null ? s.speed   + ' mm/s'   : '—';
    document.getElementById('gpDensity').textContent = s.density != null ? s.density + ' lpcm'   : '—';
    document.getElementById('gpRepeat').textContent  = s.repeat;
    document.getElementById('gpRepeatRow').style.display = s.repeat > 1 ? 'flex' : 'none';
    document.getElementById('gpSize').textContent    = `${s.w.toFixed(1)} × ${s.h.toFixed(1)} mm`;
    document.getElementById('gpPos').textContent     = `${s.x.toFixed(1)}, ${s.y.toFixed(1)} mm`;
    this.move(ev); p.classList.add('show');
  },
  move(ev) {
    const p = document.getElementById('globalPopup');
    const pw = p.offsetWidth||180, ph = p.offsetHeight||130;
    let l = ev.clientX+14, t = ev.clientY+14;
    if (l+pw > innerWidth-8) l = ev.clientX-pw-10;
    if (t+ph > innerHeight-8) t = ev.clientY-ph-10;
    p.style.left = l+'px'; p.style.top = t+'px';
  },
  hide() { document.getElementById('globalPopup').classList.remove('show'); }
};
