<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pattern Tool</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app-header">
  <a class="back" href="../">← Back</a>
  <div class="header-btns">
    <button class="hbtn" id="openXcsBtn">Open XCS</button>
    <button class="hbtn primary" id="newMandalaBtn">+ Mandala</button>
    <button class="hbtn primary" id="newGradientBtn">+ Gradient</button>
    <button class="hbtn primary" id="newBitmapLineBtn">+ Bitmap Line</button>
    <button class="hbtn" id="saveRnrBtn">Save RNR</button>
    <button class="hbtn" id="loadRnrBtn">Load RNR</button>
    <button class="hbtn" id="clearAllBtn" style="color:#e07070">Clear All</button>
    <input type="file" id="rnrInput" accept=".rnr" style="display:none">
  </div>
  <div class="tab-bar" id="tabBar"></div>
  <div id="appVersion" style="padding: 0 12px; color: #fff; font-size: 10px; font-family: monospace; white-space: nowrap;"></div>
</div>

<div class="tab-content" id="tabContent">
  <div class="welcome" id="welcomeScreen">
    <div class="welcome-title">Pattern Tool</div>
    <div class="welcome-sub">Open an XCS file or create a new mandala design</div>
    <div id="fileWarning" style="color:#e07070;background:rgba(224,112,112,0.1);padding:8px 16px;border-radius:6px;display:none;margin-bottom:10px;font-size:12px;text-align:center">
      ⚠️ <b>CORS Error:</b> Browser blocks ES modules on the <code>file://</code> protocol.<br>Please use a local server like <code>npx serve .</code> or <code>python3 -m http.server</code>
    </div>
    <div class="welcome-btns">
      <button class="hbtn" id="welcomeOpenXcsBtn">Open XCS file</button>
      <button class="hbtn primary" id="welcomeNewMandalaBtn">New Mandala</button>
      <button class="hbtn primary" id="welcomeNewGradientBtn">New Gradient</button>
      <button class="hbtn primary" id="welcomeNewBitmapLineBtn">New Bitmap Line</button>
    </div>
  </div>
</div>

<div class="popup" id="globalPopup">
  <div class="popup-title" id="gpTitle"></div>
  <div class="popup-row"><span class="popup-key">Power</span><span class="popup-val hi" id="gpPower"></span></div>
  <div class="popup-row"><span class="popup-key">Speed</span><span class="popup-val" id="gpSpeed"></span></div>
  <div class="popup-row"><span class="popup-key">Density</span><span class="popup-val" id="gpDensity"></span></div>
  <div class="popup-row" id="gpRepeatRow"><span class="popup-key">Repeat</span><span class="popup-val" id="gpRepeat"></span></div>
  <div class="popup-row" id="gpTextRow"><span class="popup-key">Text</span><span class="popup-val hi" id="gpText"></span></div>
  <div class="popup-row" id="gpFontRow"><span class="popup-key">Font</span><span class="popup-val" id="gpFont"></span></div>
  <div class="popup-row" id="gpStyleRow"><span class="popup-key">Style</span><span class="popup-val" id="gpStyle"></span></div>
  <div class="popup-row"><span class="popup-key">Size</span><span class="popup-val" id="gpSize"></span></div>
  <div class="popup-row"><span class="popup-key">Position</span><span class="popup-val" id="gpPos"></span></div>
  <div class="popup-row" id="gpCellRow" style="display:none"><span class="popup-key">Cell</span><span class="popup-val hi" id="gpCell"></span></div>
</div>

<script>
  if (window.location.protocol === 'file:') {
    document.getElementById('fileWarning').style.display = 'block';
  }
</script>
<script type="module" src="js/main.js"></script>
</body>
</html>
