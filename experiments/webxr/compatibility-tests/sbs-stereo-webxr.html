<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBS Stereo Image — WebXR</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="webxr/VRButton.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #status {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #888;
      font: 13px/1 -apple-system, sans-serif;
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid #1a1a1a; pointer-events: none;
    }
    #rev {
      position: fixed; top: 12px; right: 14px;
      color: #888; font: 11px/1 monospace; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="rev">r4</div>
  <div id="status">Loading…</div>
  <script>
    const status = document.getElementById('status');

    // ── Scene ─────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060608);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(0, 1.6, 0); // standing eye height

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    // Explicit reference space — Quest 3 needs this declared before session start
    renderer.xr.setReferenceSpaceType('local-floor');
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    // ── Fallback test-pattern texture ─────────────────────────────
    // A canvas-generated SBS gradient: left half blue, right half red.
    // This guarantees the plane is visible and stereo is verifiable even
    // when the remote image is CORS-blocked on Quest's browser.
    function makeTestPattern() {
      const c = document.createElement('canvas');
      c.width = 1024; c.height = 512;
      const cx = c.getContext('2d');
      // Left half — blue gradient
      const gl = cx.createLinearGradient(0, 0, 512, 512);
      gl.addColorStop(0, '#1a3a6a'); gl.addColorStop(1, '#5b9bd5');
      cx.fillStyle = gl; cx.fillRect(0, 0, 512, 512);
      cx.fillStyle = '#fff'; cx.font = 'bold 48px sans-serif'; cx.textAlign = 'center';
      cx.fillText('LEFT EYE', 256, 256);
      // Right half — red gradient
      const gr = cx.createLinearGradient(512, 0, 1024, 512);
      gr.addColorStop(0, '#6a1a1a'); gr.addColorStop(1, '#d55b5b');
      cx.fillStyle = gr; cx.fillRect(512, 0, 512, 512);
      cx.fillStyle = '#fff';
      cx.fillText('RIGHT EYE', 768, 256);
      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      return tex;
    }

    // ── SBS stereo texture ────────────────────────────────────────
    // Source: side-by-side image, left half = left eye, right half = right eye.
    // Starts with the test pattern so Quest always gets a valid first frame;
    // swaps to the real image once it loads with CORS.
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTex: { value: makeTestPattern() },
        uEye: { value: 0.0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D uTex;
        uniform float uEye;   // 0.0 = left eye, 1.0 = right eye
        varying vec2 vUv;
        void main() {
          // Map vUv.x into the correct SBS half:
          //   left:  0.0–0.5   right: 0.5–1.0
          float x = vUv.x * 0.5 + uEye * 0.5;
          gl_FragColor = texture2D(uTex, vec2(x, vUv.y));
        }
      `
    });

    // Load real image — swap texture only on success
    const loader = new THREE.TextureLoader();
    loader.setCrossOrigin('anonymous');
    loader.load(
      'https://theclassicphotomag.com/wp-content/uploads/Illustration16-Rau-Reflected-Beauty-In-her-Boudoir-1.jpg',
      tex => {
        tex.minFilter = THREE.LinearFilter;
        mat.uniforms.uTex.value = tex;
        status.textContent = 'Image loaded · Desktop: left eye preview · Enter VR for stereo';
      },
      undefined,
      () => {
        status.textContent = '⚠ CORS blocked — test pattern active · Enter VR to verify stereo';
      }
    );

    status.textContent = 'Ready · Enter VR for stereo';

    // ── Stereo plane ──────────────────────────────────────────────
    const PLANE_W = 2.8;   // metres (per-eye aspect ≈ 1:1 for typical SBS source)
    const PLANE_H = 2.8;
    const PLANE_Z = -3.5;  // metres in front of user

    const plane = new THREE.Mesh(new THREE.PlaneGeometry(PLANE_W, PLANE_H), mat);
    plane.position.set(0, 1.6, PLANE_Z);
    scene.add(plane);

    // ── Per-eye uniform via cam.viewport ─────────────────────────
    // BUG FIX: do NOT call renderer.xr.getCamera() inside onBeforeRender.
    // That function updates ArrayCamera projection matrices mid-render,
    // corrupting the XR frame submission → Quest compositor spins forever.
    //
    // Instead: Three.js sets cam.viewport.x = 0 for the left eye pass
    // and cam.viewport.x > 0 for the right eye pass. Read-only, no side effects.
    plane.onBeforeRender = function(renderer, scene, cam) {
      if (renderer.xr.isPresenting) {
        // cam.viewport is only defined on individual XR eye cameras
        const isLeft = !cam.viewport || cam.viewport.x === 0;
        mat.uniforms.uEye.value = isLeft ? 0.0 : 1.0;
      } else {
        mat.uniforms.uEye.value = 0.0; // desktop: show left half as preview
      }
    };

    // ── Depth anchor ──────────────────────────────────────────────
    // Small sphere at the same depth as the plane — confirms stereo parallax.
    const anchor = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 12, 8),
      new THREE.MeshBasicMaterial({ color: 0x5b9bd5 })
    );
    anchor.position.set(-PLANE_W / 2 + 0.08, 1.6 + PLANE_H / 2 - 0.08, PLANE_Z);
    scene.add(anchor);

    // ── Resize ────────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Render loop ───────────────────────────────────────────────
    // Single renderer.render() per frame — Three.js handles both XR eye
    // passes internally and fires onBeforeRender for each.
    renderer.setAnimationLoop(() => {
      renderer.render(scene, camera);
    });

  </script>
</body>
</html>
