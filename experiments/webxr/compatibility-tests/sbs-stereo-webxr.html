<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SBS Stereo Image — WebXR</title>

  <!-- r128 had unfixed WebXR Layers bugs exposed by Quest browser updates.
       Upgrade to r167 via importmap — no build system needed. -->
  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.167.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.167.0/examples/jsm/"
      }
    }
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; }
    #status {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); color: #888;
      font: 13px/1 -apple-system, sans-serif;
      padding: 6px 16px; border-radius: 20px;
      border: 1px solid #1a1a1a; pointer-events: none;
    }
    #rev {
      position: fixed; top: 12px; right: 14px;
      color: #888; font: 11px/1 monospace; pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="rev">r7</div>
  <div id="status">Loading…</div>

  <script type="module">
    import * as THREE from 'three';
    import { VRButton } from 'three/addons/webxr/VRButton.js';

    const status = document.getElementById('status');

    // ── Scene ─────────────────────────────────────────────────────
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x060608);

    const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 100);
    // Do NOT set camera.position.y — local-floor reference space already
    // tracks real head height. Adding 1.6 here would double the offset.

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.xr.enabled = true;
    renderer.xr.setReferenceSpaceType('local-floor');
    document.body.appendChild(renderer.domElement);
    document.body.appendChild(VRButton.createButton(renderer));

    // ── Fallback test-pattern texture ────────────────────────────
    // Canvas SBS pattern: left = blue "LEFT EYE", right = red "RIGHT EYE".
    // Confirms stereo is working even if the remote image is CORS-blocked.
    function makeTestPattern() {
      const c = document.createElement('canvas');
      c.width = 1024; c.height = 512;
      const cx = c.getContext('2d');
      const gl = cx.createLinearGradient(0, 0, 512, 512);
      gl.addColorStop(0, '#1a3a6a'); gl.addColorStop(1, '#5b9bd5');
      cx.fillStyle = gl; cx.fillRect(0, 0, 512, 512);
      cx.fillStyle = '#fff'; cx.font = 'bold 52px sans-serif'; cx.textAlign = 'center';
      cx.fillText('LEFT EYE', 256, 256);
      const gr = cx.createLinearGradient(512, 0, 1024, 512);
      gr.addColorStop(0, '#6a1a1a'); gr.addColorStop(1, '#d55b5b');
      cx.fillStyle = gr; cx.fillRect(512, 0, 512, 512);
      cx.fillStyle = '#fff';
      cx.fillText('RIGHT EYE', 768, 256);
      const tex = new THREE.CanvasTexture(c);
      tex.minFilter = THREE.LinearFilter;
      return tex;
    }

    // ── Stereo shader ─────────────────────────────────────────────
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTex: { value: makeTestPattern() },
        uEye: { value: 0.0 }
      },
      vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D uTex;
        uniform float uEye;
        varying vec2 vUv;
        void main() {
          float x = vUv.x * 0.5 + uEye * 0.5;
          gl_FragColor = texture2D(uTex, vec2(x, vUv.y));
        }
      `
    });

    // Try to load the real SBS image over CORS
    new THREE.TextureLoader().setCrossOrigin('anonymous').load(
      'https://theclassicphotomag.com/wp-content/uploads/Illustration16-Rau-Reflected-Beauty-In-her-Boudoir-1.jpg',
      tex => {
        tex.minFilter = THREE.LinearFilter;
        mat.uniforms.uTex.value = tex;
        status.textContent = 'Image loaded · Enter VR for stereo';
      },
      undefined,
      () => { status.textContent = '⚠ CORS blocked — test pattern active · Enter VR to verify stereo'; }
    );

    status.textContent = 'Ready · Enter VR for stereo';

    // ── Stereo plane ──────────────────────────────────────────────
    const PLANE_W = 2.8, PLANE_H = 2.8, PLANE_Z = -5.5;
    const plane = new THREE.Mesh(new THREE.PlaneGeometry(PLANE_W, PLANE_H), mat);
    plane.position.set(0, 1.6, PLANE_Z);
    scene.add(plane);

    // ── Per-eye uniform ───────────────────────────────────────────
    // Three.js sets cam.viewport.x = 0 for left eye, > 0 for right eye.
    // Read-only — avoids calling getCamera() mid-render which corrupts XR frames.
    plane.onBeforeRender = function(renderer, scene, cam) {
      if (renderer.xr.isPresenting) {
        const isLeft = !cam.viewport || cam.viewport.x === 0;
        mat.uniforms.uEye.value = isLeft ? 0.0 : 1.0;
      } else {
        mat.uniforms.uEye.value = 0.0;
      }
    };

    // ── Depth anchor ─────────────────────────────────────────────
    const anchor = new THREE.Mesh(
      new THREE.SphereGeometry(0.04, 12, 8),
      new THREE.MeshBasicMaterial({ color: 0x5b9bd5 })
    );
    anchor.position.set(-PLANE_W / 2 + 0.08, 1.6 + PLANE_H / 2 - 0.08, PLANE_Z);
    scene.add(anchor);

    // ── Floor grid — gives spatial reference so world-lock is obvious ──
    const grid = new THREE.GridHelper(20, 20, 0x222233, 0x181825);
    scene.add(grid);

    // ── Resize ───────────────────────────────────────────────────
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── Render loop ──────────────────────────────────────────────
    renderer.setAnimationLoop(() => renderer.render(scene, camera));

  </script>
</body>
</html>
