<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stereo Image on Plane</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script>
    AFRAME.registerShader('stereo-image-shader', {
      schema: {
        src: {type: 'map'}, // The stereo image source
      },
      init: function () {
        this.leftTextureOffset = new THREE.Vector2(0.0, 0.0); // Offset for left eye
        this.rightTextureOffset = new THREE.Vector2(0.5, 0.0); // Offset for right eye
      },
      vertexShader: `
        varying vec2 vUV;
        void main() {
          vUV = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform sampler2D src;
        varying vec2 vUV;
        uniform bool isLeftEye;

        void main() {
          vec2 uv = vUV;

          // Offset UV based on eye
          if (isLeftEye) {
            uv.x = uv.x * 0.5; // Left half of the image
          } else {
            uv.x = 0.5 + uv.x * 0.5; // Right half of the image
          }

          gl_FragColor = texture2D(src, uv);
        }
      `,
      update: function (data) {
        // Update the source texture
        this.material.uniforms.src.value = new THREE.TextureLoader().load(data.src);
      },
      onBeforeRender: function(renderer, scene, camera) {
        // Determine which eye is currently rendering
        this.material.uniforms.isLeftEye.value = renderer.xr.isPresenting ? renderer.xr.getCamera(camera).isLeftEye : true;
      }
    });
  </script>
</head>
<body>
  <a-scene>
    <!-- Stereo image plane -->
    <a-plane position="0 1 -3" width="4" height="2" material="shader: stereo-image-shader; src: #stereoImage"></a-plane>

    <!-- Stereo Image Texture -->
    <a-assets>
      <img id="stereoImage" src="https://theclassicphotomag.com/wp-content/uploads/Illustration16-Rau-Reflected-Beauty-In-her-Boudoir-1.jpg">
    </a-assets>
  </a-scene>
</body>
</html>
