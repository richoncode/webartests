<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three.js Cube in A-Frame</title>
  <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    AFRAME.registerComponent('threejs-cube', {
      init: function () {
        // Set up geometry and custom shader material for Three.js cube
        const geometry = new THREE.BoxGeometry();
        const material = new THREE.ShaderMaterial({
          uniforms: {
            uColor: { value: new THREE.Color(0, 1, 0) } // Set to green
          },
          vertexShader: `
            varying vec2 vUV;
            void main() {
              vUV = uv;
              gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
            }
          `,
          fragmentShader: `
            uniform vec3 uColor;
            varying vec2 vUV;
            void main() {
              vec3 gradientColor = uColor * vUV.y; // Vertical gradient based on vUV.y
              gl_FragColor = vec4(gradientColor, 1.0);
            }
          `
        });

        // Create the Three.js mesh
        this.cube = new THREE.Mesh(geometry, material);

        // Position the cube
        this.cube.position.set(0, 1, -5);

        // Add the cube to the A-Frame scene's THREE.js scene
        this.el.sceneEl.object3D.add(this.cube);
      },
      tick: function () {
        // Optionally rotate the cube for effect
        this.cube.rotation.y += 0.01;
        this.cube.rotation.x += 0.01;
      }
    });
  </script>
</head>
<body>
  <a-scene>
    <!-- Attach the custom threejs-cube component to the A-Frame scene -->
    <a-entity threejs-cube></a-entity>

    <!-- A-Frame lights -->
    <a-light type="ambient" color="#ffffff" intensity="0.5"></a-light>
    <a-light type="directional" color="#ffffff" position="1 1 -1" intensity="1"></a-light>
  </a-scene>
</body>
</html>
